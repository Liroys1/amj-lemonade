  {id:"r19",ct:"Tools",ti:"Mixpanel 101",ds:"Key funnels, event tracking, cohort analysis, and dashboards",tm:"22 min",rl:"PM",au:"Data Team",dt:"Feb 2026",
    body:[
      {h:"Getting Started",p:"Access Mixpanel at analytics.lemonade.com using your SSO credentials. You will see pre-built dashboards for your squad that track the most important metrics for your product area. Key concepts to understand: events are user actions (e.g., 'quote_started', 'claim_filed', 'policy_purchased'), properties are metadata attached to events (e.g., product line, state, device type), funnels track conversion through multi-step flows, and cohorts group users by shared characteristics or behaviors. Spend your first week exploring the pre-built dashboards to understand what data is available and how your squad uses it."},
      {h:"Key Funnels",p:"Quote-to-bind is the most important funnel for growth — it measures conversion from quote generation to policy purchase across all product lines (renters, homeowners, pet, car, life). With nearly 3 million customers and $738 million in revenue during 2025, even small improvements to this funnel have significant financial impact. Claim filing tracks drop-off through the claim submission flow, which is critical because a poor claims experience drives churn. Onboarding measures new user activation steps from first app open to first meaningful action. These are the funnels you should check daily and understand at a granular level by segment (product line, geography, device, acquisition channel)."},
      {h:"Building Reports & Analysis",p:"Use Insights for trend analysis (how is a metric changing over time?), Funnels for conversion analysis (where do users drop off?), Retention for cohort stickiness (are users coming back?), and Flows for user journey mapping (what paths do users take?). Save reports to your squad's dashboard and share notable findings in #data-insights. When building reports, always segment by product line and device at minimum. Compare time periods to understand trends rather than looking at single data points. Be cautious about drawing conclusions from small sample sizes — use Mixpanel's statistical significance indicators when available."},
      {h:"Event Taxonomy & Best Practices",p:"Lemonade follows a structured event taxonomy to ensure consistency across all product surfaces. Events follow the format 'object_action' (e.g., 'quote_started', 'claim_submitted', 'policy_modified'). Properties follow a naming convention documented in Confluence. Before creating new events, check if an existing event already captures the data you need. If you need a new event, propose it in the #data-engineering Slack channel to get it reviewed and added to the taxonomy. Consistent event naming makes cross-squad analysis possible and prevents the data warehouse from becoming messy over time."},
      {h:"Mixpanel for New Joiners",p:"In your first week, complete the Mixpanel onboarding module (linked in your squad's Confluence page) and explore your squad's dashboards. In week two, try building a simple report from scratch — for example, check the daily quote-to-bind conversion rate for your squad's product line over the past 30 days. Share your findings with your PM or squad lead. By week three, you should be comfortable building funnels, creating cohorts, and using Mixpanel to answer product questions independently. The goal is not to become a data analyst but to be able to use data to inform your daily work."}
    ]},
  {id:"r20",ct:"Tools",ti:"Analytics 101",ds:"Data literacy — how to read dashboards and make data-informed decisions",tm:"20 min",rl:"All",au:"Data Team",dt:"Jan 2026",
    body:[
      {h:"Why Data Matters",p:"At Lemonade, every team member should be data-literate. Whether you are an engineer optimizing performance, a designer running a usability test, or a PM measuring feature impact — data drives decisions. With nearly 3 million customers and $738 million in revenue during 2025, the scale of our operations means that data-informed decisions can have significant impact. We do not make product decisions based on opinions alone — we validate hypotheses with data, measure outcomes, and iterate based on evidence. Data literacy is not about being a data scientist; it is about knowing what questions to ask, where to find answers, and how to interpret results."},
      {h:"Key Dashboards & Where to Find Them",p:"Business metrics live in Looker: revenue, in-force premiums ($1.24 billion at end of 2025, up 31% YoY), new policies, claims filed, loss ratio (trailing-12-month gross loss ratio reached 64% at end of 2025), and customer count. Product metrics live in Mixpanel: activation funnels, engagement trends, conversion rates, retention cohorts, and user flows. Engineering metrics live in Datadog: service latency, error rates, uptime, and resource utilization. Each squad has dedicated dashboards in all three tools, tailored to the metrics that matter most for their domain. Bookmark your squad's dashboards in your first week and check them regularly."},
      {h:"Reading Metrics Critically",p:"Always ask five questions when looking at any metric: What is the trend (is it going up, down, or flat)? What is the baseline (what is normal)? Is the sample significant (could this be random noise)? What is the segment (does this hold true across all products, geographies, and devices)? What changed (did we ship something, did the market shift, is this seasonal)? Do not act on single data points — look for patterns across time and user groups. Be especially careful with averages, which can hide important variation. When in doubt, dig deeper into the underlying data before making recommendations."},
      {h:"Data-Informed vs. Data-Driven",p:"Lemonade is data-informed, not blindly data-driven. Data is an input to decisions, not a replacement for judgment. Sometimes the right decision is clear from the data. Sometimes the data is ambiguous and requires product intuition, domain expertise, or strategic alignment to resolve. And sometimes we make strategic bets on insufficient data because the opportunity is too important to wait for perfect information — the Tesla FSD autonomous car insurance launched in January 2026 is an example of a strategic bet based on directional data and market positioning. The skill is knowing when data should decide and when data should inform."},
      {h:"Getting Started with Data",p:"In your first week, get access to Looker, Mixpanel, and Datadog using your SSO credentials. Explore the dashboards for your squad and your product area. Ask your PM or lead to walk you through the key metrics they check weekly. Try to answer one product question using data during your second week — for example, what is the claim filing completion rate for your product line? Share your finding with your squad. Building the data habit early makes you a more effective Maker across every role at Lemonade."}
    ]},

  {id:"r21",ct:"AI",ti:"AI @ Lemonade",ds:"How AI powers claims, pricing, fraud detection, and customer support",tm:"30 min",rl:"All",au:"AI Team",dt:"Feb 2026",
    body:[
      {h:"AI at Our Core",p:"Lemonade is not a traditional insurance company using AI — we are an AI company doing insurance. Founded in 2015 by Daniel Schreiber and Shai Wininger, this distinction was baked into Lemonade from day one. AI is embedded in every layer of the business: AI Maya generates policies in under a minute and is available 24/7, serving as the primary sales and onboarding channel for nearly 3 million customers. Roughly 55% of claims are fully automated end-to-end by AI Jim, and 96% of the time it is AI Jim that takes the first notice of loss without human intervention. AI Jim settles claims in as few as 3 seconds and tracks 3.7 million signals on average per claim. Our loss adjustment expense ratio is just 6%, compared to an industry average of approximately 9%, a direct result of AI-first architecture."},
      {h:"Key AI Systems Deep Dive",p:"AI Maya is the conversational AI that handles onboarding and quotes — available 24/7, it signs up customers in under a minute through a friendly, guided conversation. AI Jim handles automated claims processing — for pet insurance, over 50% of claims are handled instantly without human involvement. CX.AI manages approximately 30% of customer inquiries without human intervention, routing complex issues to human agents with full context. Cooper is the internal engineering bot that manages workflows, task allocation, testing, and code deployment — it also monitors NASA satellite data for wildfire detection as part of Project Watchtower, giving us early warning for catastrophe risk management. Blender is the internal claims tool where human specialists see AI Jim's assignments, coverage determinations, risk alerts, and supplier dispatch information. Forensic Graph maps relationships between claims, policies, and external data for fraud detection with a false positive rate of less than 2%."},
      {h:"AI Economics & Business Impact",p:"AI is not just a technology at Lemonade — it is the economic engine that makes our business model work. The flat 25% fee model requires extreme operational efficiency to be profitable, and AI delivers that efficiency. With $738 million in revenue during 2025 (up 40% YoY), $1.24 billion in-force premiums, and a trailing-12-month gross loss ratio at a record low of 64%, the financial results demonstrate that AI-first insurance works. The 6% loss adjustment expense ratio (versus approximately 9% industry average) means we process claims at roughly two-thirds the cost of traditional insurers. Every improvement in AI automation translates directly to better unit economics, which enables competitive pricing, which drives growth — a virtuous cycle that compounds over time."},
      {h:"Synthetic Agents & GenAI",p:"We are investing heavily in Synthetic Agents — our initiative to close the cash-flow gap and unlock scalable growth through AI-driven automation. Synthetic Agents go beyond individual AI systems to create end-to-end automated workflows that handle entire business processes with minimal human oversight. Our GenAI work uses RAG (retrieval-augmented generation), function calling, and agent-based architectures to build AI systems that can reason about complex insurance scenarios. We continue to push the boundaries of what AI can do in insurance, from parametric insurance experiments to the autonomous car insurance for Tesla FSD launched in January 2026, starting in Arizona and Oregon, which integrates with the Tesla Fleet API to differentiate pricing between human-driven and self-driven miles."},
      {h:"AI Ethics & Governance",p:"We audit all models for bias across protected characteristics and ensure that AI decisions do not discriminate unfairly. We maintain human oversight for all high-impact decisions — while AI Jim automates roughly 55% of claims, complex or unusual cases are escalated to human specialists. We are transparent about AI usage with customers and comply with EU AI Act requirements across all markets where we operate. Dan Ariely, our Chief Behavioral Officer, ensures that our AI systems interact with customers in ways that are fair and aligned with honest behavior. The Giveback model itself is a form of AI ethics in action — by removing the financial incentive to deny claims, we align the AI system's optimization target with customer welfare rather than cost minimization."},
      {h:"Your Role with AI",p:"As a Maker at Lemonade, you will both use AI tools in your daily work and build AI-powered features for our customers. Document your AI usage honestly through the AI Contribution Log — we track what is AI-generated versus human-crafted not to penalize AI usage, but to understand how our team's relationship with AI evolves over time. Understand the models your squad uses at a conceptual level, even if you are not an ML engineer. Question AI outputs — you are the quality gate between AI-generated content and what ships to customers. Read the company blog posts on Synthetic Agents and autonomous car insurance to understand the strategic direction. The most effective Makers are those who can leverage AI to move faster while applying domain expertise to catch what AI misses."},
      {h:"AI Resources & Learning",p:"To deepen your understanding of AI at Lemonade, start with the AI Contribution Logging Guide and AI Output Review Checklist in the Resources section. Review recent company blog posts, particularly those on Synthetic Agents and why incumbents cannot catch up to AI-native companies. Attend AI brown bag sessions, which happen bi-weekly and feature engineers and data scientists presenting their latest work. Ask your squad's engineers about the specific AI models and pipelines relevant to your product area. The goal is not for everyone to become an ML expert, but for every Maker to have a working understanding of how AI drives the business and how to work effectively with AI systems."}
    ]},
  {id:"r22",ct:"AI",ti:"AI Contribution Logging Guide",ds:"How to document AI usage in every submission",tm:"15 min",rl:"All",au:"Engineering Practices",dt:"Feb 2026",
    body:[
      {h:"Why We Log AI",p:"AI transparency is core to Lemonade's culture. By logging AI usage in every contribution — whether it is a PR, a design, or a product brief — we track the balance between AI-assisted and human-crafted work across the organization. This practice is not about limiting AI usage or penalizing people who use it heavily. It is about understanding how we use AI, identifying where AI adds the most value, and ensuring that human judgment remains a critical part of every output. Lemonade is an AI company doing insurance, and understanding our own AI usage patterns makes us better at building AI products for our customers."},
      {h:"What to Log",p:"For every submission, record: which AI tool(s) you used (name and version if applicable), what was AI-generated versus what you refined or created from scratch, what percentage of the output is AI-originated (use the slider in the log form), and what human judgment you applied (what did you change, add, or remove from the AI output and why). Be honest and specific — there is no penalty for high AI usage. The most valuable logs are those that explain the reasoning behind your modifications, because this is where craft knowledge transfers. If AI generated code that worked but you restructured it for readability, say that. If AI suggested a design direction you rejected, explain why."},
      {h:"The AI Log Form in AMJ",p:"Use the AI Log section in the AMJ platform to record each contribution. The form fields include: contribution type (PR, design, brief, audit), AI tools used (select from common tools or type custom), AI percentage (slider from 0% to 100%), what you modified (free text explaining your edits), and what you learned (reflection on the process). Logs feed into your skill development tracking and are visible to your lead for discussion during reviews. Over time, your AI log history tells a story about your evolving craft — ideally showing that while you continue to use AI effectively, your human contributions become more sophisticated and domain-specific."},
      {h:"AI Logging Best Practices",p:"Log immediately after completing your contribution while the details are fresh. Be specific rather than vague — instead of 'used AI for scaffolding,' say 'used AI to generate the initial test structure, then added 4 edge cases specific to our claims validation logic.' Review your AI logs weekly to spot patterns: are you using AI for the same tasks repeatedly, or are you expanding into new areas? Discuss your AI usage with your lead during 1:1s — it is a great conversation starter for skill development. The goal over time is not to reduce AI usage to zero, but to use AI more intentionally and to apply deeper domain knowledge to AI outputs."},
      {h:"The Intentional AI User Badge",p:"Makers who consistently log their AI usage with thoughtful reflections can earn the Intentional AI User badge — a recognition that you are using AI as a deliberate craft tool rather than a crutch. The badge is not about low or high AI percentages; it is about demonstrating that you understand what AI contributed, what you contributed, and how the combination is better than either alone. Your lead can nominate you for this badge based on the quality and consistency of your AI logs. This badge is one of the skill achievements tracked in the AMJ platform."}
    ]},
  {id:"r23",ct:"AI",ti:"AI Output Review Checklist",ds:"5-step process for reviewing and improving AI-generated content",tm:"18 min",rl:"All",au:"AI Practices Lead",dt:"Feb 2026",
    body:[
      {h:"The 5-Step Review Process",p:"Every AI-generated output at Lemonade should go through a structured 5-step review before it ships. Step 1: Verify accuracy — check facts, numbers, references, and business logic against known sources. Insurance has specific rules per state and product line, and AI may not capture recent regulatory changes. Step 2: Check context — does the output fit our specific use case at Lemonade, or is it generic? AI trained on general data may suggest patterns that do not align with our architecture, design system, or business model. Step 3: Assess quality — is it production-ready or does it need refinement in terms of code quality, design polish, or writing clarity? Step 4: Add domain knowledge — inject what only you know from working at Lemonade, understanding our customers, and knowing your squad's domain. Step 5: Document changes — log what you modified and why in the AI Contribution Log."},
      {h:"Common Pitfalls to Watch For",p:"AI hallucinations are the most dangerous pitfall — the output sounds confident and plausible but contains factual errors. At Lemonade, where we serve nearly 3 million customers, shipping incorrect information can have real consequences. Generic solutions that are not Lemonade-specific are another common issue — AI may suggest UI patterns from other companies or architectural approaches that do not fit our microservices architecture. Over-engineering is frequent when AI generates code — it may produce a complex solution when a simple one would suffice. Missing edge cases are particularly problematic in insurance, where unusual claim scenarios, state-specific regulations, and product-line differences create many edge conditions. Outdated patterns may appear when AI references older versions of libraries, frameworks, or internal tools."},
      {h:"Best Practices for Each Role",p:"Engineers: use AI for scaffolding and boilerplate, but write business logic and test cases yourself. Run AI code through your mental model before testing — understand what it does, not just that it works. Check that AI-generated code follows our coding standards and uses our service architecture patterns. Designers: use AI for exploration and ideation, but ensure outputs align with our Design System v3 tokens and components. Check accessibility compliance. PMs: use AI for draft specs and analysis frameworks, but validate against real customer data and business metrics. Ensure AI-generated specs include Lemonade-specific context about our products, customers, and constraints. For all roles: if AI output feels off, trust your instinct and investigate — your domain expertise is the quality gate."},
      {h:"When AI Output Is Not Enough",p:"Some tasks require predominantly human work despite AI assistance. Complex architectural decisions that affect multiple services need deep understanding of our system. Novel product designs that push creative boundaries require human imagination and customer empathy. Sensitive communications with customers about claims, coverage, or policy changes need human judgment about tone and empathy. Regulatory compliance work requires verified expertise in insurance law. In these cases, AI can help with research, drafting, and brainstorming, but the final output should be substantially human-crafted. Document this in your AI log — noting that you used AI for initial exploration but the final output is primarily your own work."},
      {h:"Building Your Review Skills",p:"Like any skill, AI output review improves with practice. In your first weeks, review AI outputs with a more experienced team member to calibrate your judgment. Ask your lead to walk you through examples of AI outputs that shipped well and ones that needed significant revision. Over time, you will develop pattern recognition for common AI weaknesses in your domain. Share your learnings in your AI Contribution Log and during squad retrospectives. The goal is not to distrust AI but to develop the discernment to use it effectively — knowing when AI output is ready to ship, when it needs revision, and when it should be set aside in favor of human-crafted work."}
    ]},
  {id:"r24",ct:"AI",ti:"Contribution Review as a Learning Ritual",ds:"The 5-point protocol: context, walkthrough, AI disclosure, feedback, next steps",tm:"20 min",rl:"All",au:"L&D Team",dt:"Mar 2026",
    body:[
      {h:"Why Reviews Matter",p:"At Lemonade, every contribution review is a learning opportunity — not just quality control. Reviews are where craft skills transfer, where AI-native habits form, and where new Makers develop their professional identity. We have designed a structured 5-point protocol that turns every review into a developmental conversation. In a company with about 1,300 employees building AI-first insurance products for nearly 3 million customers, the quality of our craft directly impacts business outcomes. Reviews are the mechanism through which we maintain and elevate that quality while growing our team’s capabilities."},
      {h:"Before: Prepare Your Brief",p:"Before the review, prepare a brief covering five areas: Context (your approach and key decisions — why you chose this path over alternatives), AI Usage (what was AI-generated versus human-crafted, referencing your AI Contribution Log), Uncertainties (what you are not confident about — being honest about uncertainty shows maturity), Learning Goal (what specific skill or knowledge you want to develop through this review), and Feedback Request (specific areas where you need input, not just general approval). This brief sets the stage for a productive conversation and signals to the reviewer that you are taking the review seriously as a learning opportunity. A well-prepared brief respects the reviewer’s time and leads to more actionable feedback."},
      {h:"During: The 5-Point Protocol",p:"The 5-point protocol structures every contribution review at Lemonade. Step 1: Context Setting — the reviewer and maker align on the goal, scope, and constraints of the contribution. Step 2: Walkthrough — the maker walks through the contribution, explaining key decisions and trade-offs. This is where teaching happens: by articulating your reasoning, you deepen your own understanding and give the reviewer insight into your thinking process. Step 3: AI Disclosure — an explicit discussion of AI involvement and human judgment applied, referencing the AI Contribution Log. This normalizes transparency about AI usage and helps both parties understand the craft balance. Step 4: Feedback — the reviewer provides strengths (what went well), growth areas (what could be improved), and craft observations (patterns, techniques, or domain knowledge to develop). Step 5: Next Steps — concrete action items and skills to practice before the next review. Every step matters — do not skip or rush any of them."},
      {h:"After: Reflect and Apply",p:"After the review, log your learnings in the AI Contribution Log and update your skill grid based on the feedback received. Plan your next contribution with the review insights in mind — if the reviewer suggested a different approach to error handling or a more accessible design pattern, apply that feedback in your next piece of work. The review is not over when the meeting ends — it is over when you have applied what you learned. Consider writing a brief reflection note for yourself about what surprised you, what confirmed your thinking, and what you want to practice. Over the course of your onboarding, these reflections create a personal learning journal that shows your growth trajectory."},
      {h:"For Leads: Facilitating Reviews",p:"Make reviews developmental, not evaluative. Ask ‘why’ questions to surface the maker’s thinking process rather than simply checking outputs. Highlight what went well before addressing what needs improvement — this builds confidence and reinforces good habits. Connect feedback to skill progression in the AMJ platform, noting when a maker demonstrates readiness for skill verification. Use the Review Assistant to structure your feedback and track skill verification opportunities. Be specific in your feedback: instead of ‘this could be better,’ say ‘the error handling here does not account for the case where AI Jim escalates mid-claim — here is how we handle that.’ Great reviews at Lemonade develop Makers who can eventually review others, creating a multiplier effect across the organization."},
      {h:"Review Culture at Scale",p:"As Lemonade grows beyond 1,300 employees across New York, Tel Aviv, and operations throughout the US, UK, and Europe, maintaining a strong review culture becomes both more important and more challenging. Cross-timezone reviews require asynchronous preparation via the brief. Cross-squad reviews (required for PR approvals) build shared understanding across domains. The AI Contribution Log creates a shared language for discussing AI usage that works across all roles — engineers, designers, and PMs. Our review culture is a competitive advantage: it accelerates onboarding, maintains quality at scale, and ensures that the craft standards established by early Lemonade Makers transfer to every new joiner."}
    ]}
];

const exportCSV=(headers,rows,filename)=>{
  const csv=[headers.join(","),...rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(","))].join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=filename;a.click();
  URL.revokeObjectURL(url);
};

const computeHealthBreakdown=(emp)=>{
  const contribFreq=Math.min(100,Math.round((emp.co.length/4)*100));
  const totalSk=emp.sk.length||1;const verifiedSk=emp.sk.filter(s=>s.sr==="manager-verified").length;const practicingSk=emp.sk.filter(s=>s.lv==="proficient"||s.lv==="practicing").length;
  const skillProgress=Math.min(100,Math.round(((verifiedSk*2+practicingSk)/totalSk)*50));
  const avgAI=emp.co.length?Math.round(emp.co.reduce((s,c)=>s+c.ai,0)/emp.co.length):50;
  const aiBalance=Math.min(100,Math.max(0,Math.round(100-Math.abs(avgAI-45)*1.5)));
  const curPhase=pDay(emp.day);const phaseProgress=Math.min(100,Math.round((curPhase/4)*100));
  const shipped=emp.co.filter(c=>c.st==="merged"||c.st==="shipped").length;const hasAudit=emp.co.some(c=>c.ty==="Audit")?15:0;const recentActivity=emp.co.filter(c=>c.da<=5).length;
  const engagement=Math.min(100,Math.round((shipped*15+hasAudit+recentActivity*10)));
  return[{lb:"Contribution Frequency",v:contribFreq,co:"#3b82f6"},{lb:"Skill Progress",v:skillProgress,co:"#8b5cf6"},{lb:"AI Balance",v:aiBalance,co:"#FF0083"},{lb:"Phase Progress",v:phaseProgress,co:"#10b981"},{lb:"Engagement",v:engagement,co:"#f59e0b"}];
};

const Toast=({msg,type,onDone})=>{
  const[out,setOut]=useState(false);
  useEffect(()=>{const t=setTimeout(()=>setOut(true),2700);const t2=setTimeout(onDone,3000);return()=>{clearTimeout(t);clearTimeout(t2)}},[]);
  const cols={success:{bg:'#10b981',ic:'M5 13l4 4L19 7'},error:{bg:'#ef4444',ic:'M6 18L18 6M6 6l12 12'},warning:{bg:'#f59e0b',ic:'M12 9v4m0 4h.01M12 2L2 22h20L12 2z'},info:{bg:'#3b82f6',ic:'M12 16v-4m0-4h.01M12 2a10 10 0 100 20 10 10 0 000-20z'}};
  const c=cols[type||'success'];
  return<div className={`fixed bottom-6 right-6 z-[100] flex items-center gap-3 px-5 py-3 rounded-2xl shadow-lg ${out?'toast-out':'toast-in'}`} style={{background:c.bg,color:'white'}}>
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d={c.ic}/></svg>
    <span className="text-[14px] font-semibold">{typeof msg==='string'?msg:msg.text||msg.msg||''}</span>
  </div>
};

const actScr=act=>{if(!act)return null;const a=act.toLowerCase();if(a.includes("pr ")||a.includes("merged")||a.includes("submitted")||a.includes("shipped")||a.includes("contribution"))return"contribs";if(a.includes("skill")||a.includes("verified"))return"skills";if(a.includes("design"))return"contribs";if(a.includes("checklist"))return"checklist";if(a.includes("audit")||a.includes("backlog"))return"contribs";if(a.includes("brief"))return"contribs";return null};

const Skills=({emp,ro=false,onV=null})=>{

  },[emp.sk]);

      <h3 className="text-[10px] font-semibold uppercase tracking-[.1em] text-[#9CA3AF] mb-2">Competency Profile</h3>

const CrisisSim=()=>{
  const scenarios=[
    {id:0,title:"The Friendly Email",desc:"AI drafted a response to a frustrated policyholder whose claim was denied.",
      content:"Dear valued customer,\n\nThank you for reaching out! We're so happy to help! \n\nUnfortunately, your claim #4521 for water damage has been denied because it falls outside our coverage area. But don't worry — there are plenty of other insurance options available!\n\nHave a wonderful day!\nThe Lemonade Team",
      flaws:[{id:0,line:"We're so happy to help!",why:"Tone-deaf — customer is frustrated about a denied claim"},
        {id:1,line:"But don't worry",why:"Minimizing the customer's real concern"},
        {id:2,line:"plenty of other insurance options",why:"Suggesting they leave — we should retain, not deflect"},
        {id:3,line:"Have a wonderful day!",why:"Inappropriate closing for bad news"}]},
    {id:1,title:"The Buggy Code",desc:"AI generated a premium calculation function with hidden issues.",
      content:"function calculatePremium(age, zipCode, coverage) {\n  let base = coverage * 0.02;\n  if (age > 25) base *= 0.9;\n  if (age > 65) base *= 1.5;\n  const risk = fetch('/api/risk/' + zipCode);\n  return base + risk.risk_factor;\n}",
      flaws:[{id:0,line:"if (age > 65) base *= 1.5",why:"Potential age discrimination — may violate insurance regulations"},
        {id:1,line:"fetch('/api/risk/' + zipCode)",why:"Using async fetch synchronously — returns Promise, not data"},
        {id:2,line:"risk.risk_factor",why:"No null/error check — crashes silently if API fails"},
        {id:3,line:"No input validation",why:"Missing validation for age, zipCode, coverage params"}]},
    {id:2,title:"The Flawed Spec",desc:"AI drafted a product spec for auto-approving claims.",
      content:"Feature: Auto-Approve Small Claims\n\nGoal: Speed up claims processing\n- Approve all claims under $500 automatically\n- No human review needed\n- Launch to 100% of users immediately\n- Success metric: Processing speed",
      flaws:[{id:0,line:"Approve all claims under $500 automatically",why:"No fraud detection — invites abuse without verification"},
        {id:1,line:"No human review needed",why:"Regulatory risk — many jurisdictions require human oversight"},
        {id:2,line:"Launch to 100% immediately",why:"No gradual rollout — should start small to catch issues"},
        {id:3,line:"Success metric: Processing speed",why:"Missing fraud rate, satisfaction, accuracy metrics"}]}
  ];
  const[sel,setSel]=useState(0);const[flagged,setFlagged]=useState({});const[revealed,setRevealed]=useState(false);
  const sc=scenarios[sel];const found=flagged[sel]||{};const foundCount=Object.values(found).filter(Boolean).length;
  const toggle=fid=>{if(revealed)return;setFlagged(p=>({...p,[sel]:{...(p[sel]||{}),[fid]:!(p[sel]||{})[fid]}}))};
  const reset=()=>{setFlagged({});setRevealed(false)};
  return<div className="fi">
    <div className="mb-6"><h1 className="h-serif text-[22px] sm:text-[28px] font-bold text-[#1A1A2E]">Crisis Simulation</h1><p className="text-[14px] text-[#6B7280] mt-1">Spot the flaws in AI-generated output</p></div>
    <div className="flex flex-wrap gap-2 mb-6">{scenarios.map((s,i)=><button key={i} onClick={()=>{setSel(i);setRevealed(false)}} className={`px-3 sm:px-4 py-1.5 sm:py-2 rounded-[14px] text-[13px] sm:text-[14px] font-medium transition-all ${sel===i?"bg-[#FF0083] text-white shadow-lg":"bg-white border border-[#E5E7EB] text-[#6B7280] hover:border-[#FF0083] shadow-sm"}`}>{s.title}</button>)}</div>
    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
      <div>
        <div className="bg-white border border-[#E5E7EB] rounded-[14px] p-5 shadow-sm mb-4">
          <p className="text-[14px] text-[#6B7280] mb-4">{sc.desc}</p>
          <pre className="bg-[#F7F7F7] border border-[#E5E7EB] rounded-xl p-4 text-[13px] text-[#1A1A2E] whitespace-pre-wrap leading-relaxed font-mono">{sc.content}</pre>
        </div>
        {revealed&&<div className="bg-white border border-[#E5E7EB] rounded-[14px] p-5 shadow-sm fi">
          <div className="flex items-center gap-3 mb-4"><span className="w-8 h-8 rounded-full flex items-center justify-center" style={{background:foundCount===sc.flaws.length?"#f0fdf4":foundCount>=2?"#eff6ff":"#fef9c3"}}><CI n={foundCount===sc.flaws.length?"target-sm":foundCount>=2?"check-round":"eye"} sz={20} co={foundCount===sc.flaws.length?"#10b981":foundCount>=2?"#3b82f6":"#d97706"}/></span><div><p className="text-[16px] font-bold text-[#1A1A2E]">{foundCount}/{sc.flaws.length} flaws identified</p><p className="text-[14px] text-[#6B7280]">{foundCount===sc.flaws.length?"Perfect score!":foundCount>=2?"Good eye! Review the ones you missed.":"Keep practicing — review the explanations."}</p></div></div>
          <button onClick={reset} className="text-[14px] text-[#FF0083] font-medium hover:underline">Try all scenarios again</button>
        </div>}
      </div>
      <div>
        <h3 className="text-[11px] font-semibold uppercase tracking-[.1em] text-[#9CA3AF] mb-3">Flag the issues you find</h3>
        <div className="space-y-3">
          {sc.flaws.map(f=><div key={f.id} onClick={()=>toggle(f.id)} className={`rounded-[14px] p-4 border transition-all cursor-pointer ${revealed?(found[f.id]?"bg-[#f0fdf4] border-[#10b981]":"bg-[#fef2f2] border-[#ef4444]"):(found[f.id]?"bg-[#FF008308] border-[#FF0083] shadow-sm":"bg-white border-[#E5E7EB] hover:border-[#FF0083] shadow-sm")}`}>
            <div className="flex items-start gap-3">
              <div className={`w-6 h-6 rounded-md border-2 flex items-center justify-center flex-shrink-0 mt-0.5 ${revealed?(found[f.id]?"bg-[#10b981] border-[#10b981] text-white":"bg-[#ef4444] border-[#ef4444] text-white"):(found[f.id]?"bg-[#FF0083] border-[#FF0083] text-white":"border-[#D1D5DB]")}`}>
                {(found[f.id]||revealed)&&<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><polyline points="20 6 9 17 4 12"/></svg>}
              </div>
              <div><p className="text-[14px] font-medium text-[#1A1A2E]">{f.line}</p>
                {revealed&&<p className="text-[13px] text-[#6B7280] mt-1">{f.why}</p>}
              </div>
            </div>
          </div>)}
        </div>
        {!revealed&&<button onClick={()=>setRevealed(true)} className="mt-5 w-full bg-[#FF0083] text-white rounded-[14px] py-3 text-[14px] font-semibold btn-p">Check Answers</button>}
      </div>
    </div>
  </div>
};

const computeNudges=(emp)=>{
  const nudges=[];
  // PR stuck in review > 3 days
  emp.co.filter(c=>c.st==="in-review"&&c.da>3).forEach(c=>{nudges.push({tx:`"${c.ti}" has been in review for ${c.da} days — follow up with your reviewer`,ic:"clock",priority:1,type:"stuck",scr:"contributions"})});
  // Skills stuck in "learning" status
  const learningSkills=emp.sk.filter(s=>s.sr==="onboarding"&&s.lv==="learning");
  if(learningSkills.length>=2){nudges.push({tx:`${learningSkills.length} skills still at "learning" level (${learningSkills.slice(0,2).map(s=>s.nm).join(", ")}) — try applying them in your next contribution`,ic:"target-sm",priority:2,type:"skill-gap",scr:"skills"})}
  // Low contribution count for the day
  const expectedContribs=Math.floor(emp.day/5);
  if(emp.co.length<expectedContribs){nudges.push({tx:`You've made ${emp.co.length} contributions by Day ${emp.day} — aim for at least ${expectedContribs} to stay on track`,ic:"pencil",priority:2,type:"low-contrib",scr:"contributions"})}
  // High AI usage average
  const avgAI=emp.co.length?Math.round(emp.co.reduce((s,c)=>s+c.ai,0)/emp.co.length):0;
  if(avgAI>60&&emp.co.length>=2){nudges.push({tx:`Your avg AI usage is ${avgAI}% — try reducing AI reliance on your next submission to build craft skills`,ic:"robot",priority:2,type:"high-ai",scr:"ai-usage"})}
  // Upcoming phase transition
  const nextPhase=emp.day<=5?6:emp.day<=10?11:emp.day<=18?19:31;
  const daysToNext=nextPhase-emp.day;
  if(daysToNext>0&&daysToNext<=3){const nextPh=pInfo(nextPhase<=30?nextPhase:30);nudges.push({tx:`Phase transition in ${daysToNext} day${daysToNext>1?"s":""}! Prepare for "${nextPh.nm}" — check the journey map`,ic:"rocket",priority:1,type:"phase-transition",scr:"journey"})}
  // First Impressions → Fresh Eyes Audit nudge
  if(emp.day>=11&&!emp.co.some(c=>c.ty==="Audit")){const fi=JSON.parse(localStorage.getItem('amj-fi-'+emp.id)||'{}');if(fi.magical||fi.broken||fi.confused){nudges.push({tx:`Your first impressions from Day ${fi.savedDay||'1'} are ready — time to turn them into a Fresh Eyes Audit`,ic:"eye",priority:2,type:"fi-to-audit",scr:"first-impressions"})}else{nudges.push({tx:"You haven't submitted a Fresh Eyes Audit yet — this is a key milestone for Week 3",ic:"eye",priority:3,type:"missing-audit",scr:"contributions"})}}
  // Draft items sitting too long
  emp.co.filter(c=>c.st==="draft"&&c.da>5).forEach(c=>{nudges.push({tx:`"${c.ti}" is still a draft after ${c.da} days — consider finalizing it`,ic:"pencil",priority:3,type:"stale-draft",scr:"contributions"})});
  // Sort by priority
  nudges.sort((a,b)=>a.priority-b.priority);
  return nudges;
};

const WeeklyGoals=({toast,onCelebrate,setScr})=>{
  const[goals,setGoals]=useState(GOALS);const[prevW,setPrevW]=useState(false);
  const[dragIdx,setDragIdx]=useState(null);const[hoverIdx,setHoverIdx]=useState(null);
  const done=goals.filter(g=>g.cur>=g.tgt).length;
  const toggle=id=>{setGoals(p=>{const ng=p.map(g=>g.id===id?{...g,cur:g.cur>=g.tgt?0:g.tgt}:g);if(ng.every(g=>g.cur>=g.tgt))onCelebrate?.();return ng});toast("Goal updated")};
  const onDragStart=(e,i)=>{setDragIdx(i);e.dataTransfer.effectAllowed="move"};
  const onDragOver=(e,i)=>{e.preventDefault();e.dataTransfer.dropEffect="move";setHoverIdx(i)};
  const onDragEnd=()=>{if(dragIdx!==null&&hoverIdx!==null&&dragIdx!==hoverIdx){setGoals(p=>{const ng=[...p];const[item]=ng.splice(dragIdx,1);ng.splice(hoverIdx,0,item);return ng});toast("Goals reordered")}setDragIdx(null);setHoverIdx(null)};
  return<div className="fi">
    <div className="flex flex-col sm:flex-row sm:items-center justify-between mb-6 sm:mb-8 gap-3">
      <div><h1 className="h-serif text-[22px] sm:text-[28px] font-bold text-[#1A1A2E]">Weekly Goals</h1><p className="text-[13px] sm:text-[14px] text-[#6B7280] mt-1">Week 2 objectives &mdash; drag to reorder</p></div>
      <div className="flex items-center gap-3 sm:gap-4"><HR s={Math.round(done/goals.length*100)} sz={48}/><div><p className="text-[14px] font-bold text-[#1A1A2E]">{done}/{goals.length}</p><p className="text-[12px] text-[#6B7280]">completed</p></div></div>
    </div>
    <div className="space-y-3 mb-6">{goals.map((g,gi)=>{const dn=g.cur>=g.tgt;return<div key={g.id} draggable="true" onDragStart={e=>onDragStart(e,gi)} onDragOver={e=>onDragOver(e,gi)} onDragEnd={onDragEnd} className={`bg-white border rounded-[14px] p-4 flex items-center gap-4 shadow-sm transition-all cursor-pointer select-none ${dragIdx===gi?"dragging-item":""} ${hoverIdx===gi&&dragIdx!==null&&dragIdx!==gi?"drag-over-line":""} ${dn?"border-[#10b981] bg-[#f0fdf4]":"border-[#E5E7EB] hover:border-[#FF0083]"}`}>
      <span className="text-[#D1D5DB] cursor-grab active:cursor-grabbing flex-shrink-0 text-[16px]" title="Drag to reorder">&#x2807;</span>
      <div onClick={()=>toggle(g.id)} className={`w-7 h-7 rounded-lg border-2 flex items-center justify-center flex-shrink-0 ${dn?"bg-[#10b981] border-[#10b981] text-white":"border-[#D1D5DB]"}`}>{dn&&<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><polyline points="20 6 9 17 4 12"/></svg>}</div>
      <span className="flex-shrink-0"><CI n={g.ic} sz={18}/></span>
      <div className="flex-1" onClick={()=>toggle(g.id)}><span className={`text-[14px] font-medium ${dn?"text-[#6B7280] line-through":"text-[#1A1A2E]"}`}>{g.tx}</span>
        {g.ds&&<p className="text-[11px] text-[#9CA3AF] mt-0.5">{g.ds}</p>}
        <div className="flex items-center gap-2 mt-1"><div className="w-24 h-1.5 bg-[#F3F4F6] rounded-full overflow-hidden"><div className="h-full rounded-full transition-all" style={{width:`${(g.cur/g.tgt)*100}%`,background:dn?"#10b981":"#FF0083"}}/></div><span className="text-[11px] text-[#9CA3AF]">{g.cur}/{g.tgt}</span></div>
      </div>
      <div className="flex items-center gap-2 flex-shrink-0">
        <span className="text-[11px] px-2.5 py-0.5 rounded-full bg-[#F3F4F6] text-[#9CA3AF] font-medium">{g.cat}</span>
        {g.link&&setScr&&<button onClick={e=>{e.stopPropagation();setScr(g.link)}} className="text-[11px] px-2.5 py-0.5 rounded-full border border-[#FF008330] text-[#FF0083] font-medium hover:bg-[#FF008310] transition-all whitespace-nowrap">Go &rarr;</button>}
      </div>
    </div>})}</div>
    <button onClick={()=>setPrevW(!prevW)} className="text-[14px] text-[#FF0083] font-medium hover:underline mb-4">{prevW?"Hide":"Show"} previous week</button>
    {prevW&&<div className="bg-[#F7F7F7] border border-[#E5E7EB] rounded-[14px] p-5 fi"><h3 className="text-[11px] font-semibold uppercase tracking-[.1em] text-[#9CA3AF] mb-3">Week 1 Results</h3>
      <div className="space-y-2">{["Complete company orientation","Shadow 3 customer interactions","Set up development environment","Read architecture overview"].map((t,i)=><div key={i} className="flex items-center gap-3 text-[14px] text-[#6B7280]"><span className="text-[#10b981]">✓</span><span className="line-through">{t}</span></div>)}</div>
      <p className="mt-3 text-[14px] font-semibold text-[#10b981]">4/4 completed</p>
    </div>}
  </div>

const AlertCenter=({emps,toast,onSel})=>{
  const[acked,setAcked]=useState({});
  const alerts=useMemo(()=>{const a=[];
    emps.forEach(e=>{
      if(e.hp<60)a.push({id:e.id+"_hp",sev:"critical",emp:e,tx:`Health score critically low at ${e.hp}`,rec:"Schedule immediate 1:1 to identify blockers"});
      else if(e.hp<70)a.push({id:e.id+"_hp",sev:"warning",emp:e,tx:`Health score below target at ${e.hp}`,rec:"Check in during next standup"});
      e.co.filter(c=>c.st==="in-review"&&c.da>5).forEach(c=>a.push({id:c.id+"_stuck",sev:"warning",emp:e,tx:`"${c.ti}" stuck in review for ${c.da} days`,rec:"Help find a reviewer or unblock"}));
      const r2=e.co.slice(0,2);if(r2.length>=2&&r2.every(c=>c.ai>70))a.push({id:e.id+"_ai",sev:"warning",emp:e,tx:"High AI reliance (>70%) on recent work",rec:"Discuss intentional AI usage in 1:1"});
      e.co.filter(c=>c.bl).forEach(c=>a.push({id:c.id+"_bl",sev:"info",emp:e,tx:`"${c.ti}" added to product backlog`,rec:"Recognize publicly in standup"}));
      if(e.sk.some(s=>s.sr==="manager-verified"))a.push({id:e.id+"_ver",sev:"info",emp:e,tx:`${e.nm} has verified skills — milestone reached`,rec:"Celebrate the achievement"});
    });
    return a.sort((x,y)=>({critical:0,warning:1,info:2})[x.sev]-({critical:0,warning:1,info:2})[y.sev]);
  },[emps]);
  const active=alerts.filter(a=>!acked[a.id]);
  const ct={critical:active.filter(a=>a.sev==="critical").length,warning:active.filter(a=>a.sev==="warning").length,info:active.filter(a=>a.sev==="info").length};
  const sevC={critical:{bg:"#fef2f2",bd:"#ef4444",tx:"#dc2626"},warning:{bg:"#fffbeb",bd:"#f59e0b",tx:"#d97706"},info:{bg:"#eff6ff",bd:"#3b82f6",tx:"#2563eb"}};

      </div>)}
    </div>
    <div className="space-y-3">{active.map(a=>{const c=sevC[a.sev];return<div key={a.id} className="rounded-[14px] p-3 sm:p-4 border-l-[3px] shadow-sm fi" style={{background:c.bg,borderLeftColor:c.bd}}>
      <div className="flex items-start gap-3">
        <div className="flex-shrink-0 cursor-pointer" onClick={()=>onSel&&onSel(a.emp.id)}><Av e={a.emp} sz={36}/></div>
        <div className="flex-1 min-w-0">
          <div className="flex items-center gap-2 mb-1 flex-wrap"><span className="text-[13px] sm:text-[14px] font-semibold text-[#1A1A2E] cursor-pointer hover:text-[#FF0083] transition-colors" onClick={()=>onSel&&onSel(a.emp.id)}>{a.emp.nm}</span><span className="text-[10px] sm:text-[11px] px-2 py-0.5 rounded-full font-medium capitalize" style={{background:c.bd+"20",color:c.tx}}>{a.sev}</span></div>

const HeatmapCalendar=({emps})=>{
  const[hovCell,setHovCell]=useState(null);
  const days=Array.from({length:30},(_,i)=>i+1);
  // Build activity map: for each emp, count contributions per day
  const actMap={};emps.forEach(e=>{actMap[e.id]={};e.co.forEach(c=>{const d=Math.max(1,Math.min(30,e.day-c.da+1));if(!actMap[e.id][d])actMap[e.id][d]=0;actMap[e.id][d]++})});
  // Find max for color scale
  let maxAct=1;emps.forEach(e=>{days.forEach(d=>{const v=actMap[e.id][d]||0;if(v>maxAct)maxAct=v})});
  const heatColor=(count)=>{if(!count)return"#F7F7F7";const ratio=count/maxAct;if(ratio<=0.25)return"#FFE0EF";if(ratio<=0.5)return"#FFB3D4";if(ratio<=0.75)return"#FF66AA";return"#FF0083"};
  return<div className="bg-white border border-[#E5E7EB] rounded-[14px] p-5 shadow-sm">
    <h3 className="text-[10px] font-semibold uppercase tracking-[.1em] text-[#9CA3AF] mb-4">Activity Heatmap (30 Days)</h3>
    <div className="overflow-x-auto">
      <div style={{display:"grid",gridTemplateColumns:`60px repeat(30, minmax(14px, 1fr))`,gap:"2px",minWidth:"540px"}}>
        {/* Header row — day numbers */}
        <div/>
        {days.map(d=><div key={d} className="text-[8px] text-[#9CA3AF] text-center font-medium" style={{lineHeight:"14px"}}>{d}</div>)}
        {/* Employee rows */}
        {emps.map(e=><React.Fragment key={e.id}>
          <div className="text-[11px] text-[#6B7280] font-medium truncate flex items-center pr-2" style={{height:18}}>{e.nm.split(" ")[0]}</div>
          {days.map(d=>{const count=actMap[e.id][d]||0;const isHov=hovCell&&hovCell.eid===e.id&&hovCell.d===d;const isToday=d===e.day;
            return<div key={d} onMouseEnter={()=>setHovCell({eid:e.id,enm:e.nm,d,count})} onMouseLeave={()=>setHovCell(null)} className="rounded-sm cursor-pointer transition-all relative" style={{width:"100%",height:18,background:heatColor(count),border:isHov?"2px solid #1A1A2E":isToday?"2px solid #FF008380":"2px solid transparent",opacity:count||isToday?1:.5}}>
              {isHov&&<div className="absolute z-30 bg-[#1A1A2E] text-white text-[10px] px-2 py-1 rounded-lg whitespace-nowrap shadow-lg" style={{bottom:"calc(100% + 4px)",left:"50%",transform:"translateX(-50%)"}}>{hovCell.enm} - Day {d}{isToday?" (today)":""}: {count} contribution{count!==1?"s":""}</div>}
            </div>})}
        </React.Fragment>)}
      </div>
    </div>
    <div className="flex items-center gap-2 mt-3 justify-end"><span className="text-[10px] text-[#9CA3AF]">0</span>{[0,1,2,3,4].map(i=><div key={i} className="w-3 h-3 rounded-sm" style={{background:i===0?"#F7F7F7":i===1?"#FFE0EF":i===2?"#FFB3D4":i===3?"#FF66AA":"#FF0083"}}/>)}<span className="text-[10px] text-[#9CA3AF]">3+ contributions</span></div>
  </div>
};

// ───────────────── NEW: BENCHMARKS ─────────────────
const BenchCounter=({target,loaded,suffix})=>{
  const[val,setVal]=useState(0);
  useEffect(()=>{if(!loaded){setVal(0);return}let start=0;const end=target;const dur=1000;const startTime=Date.now();const tick=()=>{const elapsed=Date.now()-startTime;const progress=Math.min(elapsed/dur,1);const eased=1-Math.pow(1-progress,3);const current=Number.isInteger(end)?Math.round(eased*end):parseFloat((eased*end).toFixed(1));setVal(current);if(progress<1)requestAnimationFrame(tick)};requestAnimationFrame(tick)},[loaded,target]);
  return<span>{val}{suffix||""}</span>
};

// ───────────────── NEW: ATTRITION RISK ─────────────────
const AttritionRisk=()=>{
  const[sel,setSel]=useState(null);
  const scored=E.map(e=>{
    const eng=(e.co.length/Math.max(e.day/7,1))*25+e.hp*.25;
    const prog=(e.day/30)*50+(e.sk.filter(s=>s.sr==="manager-verified").length*10);
    return{...e,eng:Math.min(100,Math.round(eng)),prog:Math.min(100,Math.round(prog)),quad:eng>=50&&prog>=50?"thriving":eng>=50?"needs-challenge":prog>=50?"needs-support":"at-risk"};
  });
  const qC={thriving:{lb:"Thriving",co:"#10b981",bg:"#f0fdf4"},"needs-challenge":{lb:"Needs Challenge",co:"#3b82f6",bg:"#eff6ff"},"needs-support":{lb:"Needs Support",co:"#f59e0b",bg:"#fffbeb"},"at-risk":{lb:"At Risk",co:"#ef4444",bg:"#fef2f2"}};
  const counts={};Object.keys(qC).forEach(k=>counts[k]=scored.filter(s=>s.quad===k).length);
  return<div className="fi">
    <div className="mb-6"><h1 className="h-serif text-[22px] sm:text-[28px] font-bold text-[#1A1A2E]">Attrition Risk</h1><p className="text-[14px] text-[#6B7280] mt-1">Engagement vs progress matrix</p></div>
    <div className="bg-[#F7F7F7] border border-[#E5E7EB] rounded-[14px] p-4 mb-5 text-[13px] text-[#6B7280]">
      <p className="font-semibold text-[#1A1A2E] mb-2 flex items-center gap-2"><CI n="bar-chart" sz={16} co="#1A1A2E"/> How scores are computed:</p>
      <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 sm:gap-4">
        <div><strong className="text-[#FF0083]">Engagement</strong> = Contribution frequency (contributions per week × 25) + Health score (× 0.25). Higher engagement means more consistent output and better wellbeing.</div>
        <div><strong className="text-[#3b82f6]">Progress</strong> = Day progress (day/30 × 50) + Verified skills count (× 10). Higher progress means advancing through phases and getting skills verified by leads.</div>
      </div>
    </div>
    <div className="flex flex-wrap gap-2 sm:gap-3 mb-6">{Object.entries(qC).map(([k,v])=><div key={k} className="bg-white border border-[#E5E7EB] rounded-[14px] px-3 sm:px-4 py-2 sm:py-2.5 shadow-sm flex items-center gap-2">
      <div className="w-2.5 h-2.5 rounded-full" style={{background:v.co}}/><span className="text-[14px] font-bold" style={{color:v.co}}>{counts[k]}</span><span className="text-[12px] text-[#9CA3AF]">{v.lb}</span>
    </div>)}</div>
    <div className="bg-white border border-[#E5E7EB] rounded-[14px] p-6 shadow-sm mb-5">
      <div className="relative" style={{height:'min(320px, 60vw)'}}>
        <div className="absolute inset-0 grid grid-cols-2 grid-rows-2">
          {[["needs-support","top-0 left-0"],["thriving","top-0 right-0"],["at-risk","bottom-0 left-0"],["needs-challenge","bottom-0 right-0"]].map(([q,pos])=>
            <div key={q} className={`rounded-xl m-1 flex items-center justify-center`} style={{background:qC[q].bg}}><span className="text-[11px] font-semibold uppercase tracking-wider" style={{color:qC[q].co,opacity:.5}}>{qC[q].lb}</span></div>
          )}
        </div>
        {scored.map(s=>{const x=s.eng*0.9+5,y=100-s.prog*0.9-5;return(
          <button key={s.id} onClick={()=>setSel(sel?.id===s.id?null:s)} className="absolute z-10 group" style={{left:`${x}%`,top:`${y}%`,transform:"translate(-50%,-50%)"}}>
            <div className={`rounded-full border-2 transition-all ${sel?.id===s.id?"scale-125 border-[#FF0083]":"border-white hover:scale-110"}`} style={{boxShadow:"0 2px 8px rgba(0,0,0,.15)"}}><Av e={s} sz={36}/></div>
          </button>
        )})}
        <p className="absolute bottom-[-20px] left-1/2 -translate-x-1/2 text-[10px] text-[#9CA3AF] uppercase tracking-wider">Engagement →</p>
        <p className="absolute top-1/2 left-[-20px] -translate-y-1/2 -rotate-90 text-[10px] text-[#9CA3AF] uppercase tracking-wider">Progress →</p>
      </div>
    </div>
    {sel&&<div className="bg-white border border-[#E5E7EB] rounded-[14px] p-5 shadow-sm fi">
      <div className="flex items-center gap-3 mb-3"><Av e={sel} sz={40}/><div><h3 className="text-[14px] font-semibold text-[#1A1A2E]">{sel.nm}</h3><p className="text-[12px] text-[#6B7280]">{sel.rl} · Day {sel.day}</p></div>
        <span className="ml-auto text-[11px] px-3 py-1 rounded-full font-semibold" style={{background:qC[sel.quad].bg,color:qC[sel.quad].co}}>{qC[sel.quad].lb}</span>
      </div>
      <div className="grid grid-cols-3 sm:grid-cols-3 gap-2 sm:gap-3">{[["Engagement",sel.eng],["Progress",sel.prog],["Health",sel.hp]].map(([lb,v],i)=>
        <div key={i} className="bg-[#F7F7F7] rounded-xl p-2 sm:p-3 text-center border border-[#E5E7EB]"><p className="text-[16px] sm:text-[18px] font-bold text-[#1A1A2E]">{v}</p><p className="text-[9px] sm:text-[10px] text-[#9CA3AF] uppercase font-medium">{lb}</p></div>
      )}</div>
    </div>}
  </div>
};

const Confetti=({show})=>{
  if(!show)return null;
  const colors=['#FF0083','#10b981','#3b82f6','#f59e0b','#e6007a','#818cf8'];
  return<div style={{position:'fixed',top:'40%',left:'50%',transform:'translate(-50%,-50%)',zIndex:200,pointerEvents:'none'}}>
    {Array.from({length:30}).map((_,i)=>{
      const a=Math.random()*360;const d=40+Math.random()*80;const x=Math.cos(a*Math.PI/180)*d;const y=Math.sin(a*Math.PI/180)*d;const sz=4+Math.random()*6;
      return<span key={i} style={{position:'absolute',width:sz+'px',height:sz+'px',borderRadius:Math.random()>.5?'50%':'2px',background:colors[i%colors.length],left:0,top:0,animation:`confetti 1.2s ease-out ${Math.random()*.3}s forwards`,transform:`translate(${x}px,${y}px)`}}/>
    })}

};

// ───────────────── COMMAND PALETTE ─────────────────
const CmdPalette=({open,onClose,query,setQuery,results,idx,setIdx,onSelect})=>{
  const ref=useRef(null);
  useEffect(()=>{if(open&&ref.current)ref.current.focus()},[open]);
  useEffect(()=>{setIdx(0)},[query]);
  if(!open)return null;
  const handleKey=e=>{
    if(e.key==='ArrowDown'){e.preventDefault();setIdx(p=>Math.min(p+1,results.length-1))}
    if(e.key==='ArrowUp'){e.preventDefault();setIdx(p=>Math.max(p-1,0))}
    if(e.key==='Enter'&&results[idx]){onSelect(results[idx]);onClose()}
  };
  return<div className="fixed inset-0 z-[200] flex items-start justify-center pt-[15vh]" onClick={onClose}>
    <div className="absolute inset-0 bg-black/40 backdrop-blur-sm"/>
    <div className="relative w-[calc(100vw-32px)] sm:w-[560px] bg-white rounded-2xl shadow-2xl overflow-hidden cmd-in" onClick={e=>e.stopPropagation()}>
      <div className="flex items-center gap-3 px-5 py-4 border-b border-[#E5E7EB]">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" strokeWidth="2" strokeLinecap="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input ref={ref} value={query} onChange={e=>setQuery(e.target.value)} onKeyDown={handleKey}
          className="flex-1 text-[16px] text-[#1A1A2E] placeholder-[#9CA3AF] focus:outline-none bg-transparent" placeholder="Search anything..."/>
        <kbd className="text-[11px] text-[#9CA3AF] border border-[#E5E7EB] rounded px-1.5 py-0.5 font-mono">ESC</kbd>
      </div>
      {results.length>0?<div className="max-h-[360px] overflow-y-auto py-2">
        {results.map((r,i)=><button key={i} onClick={()=>{onSelect(r);onClose()}}
          className={`w-full px-5 py-3 flex items-center gap-3 text-left transition-colors ${i===idx?'bg-[#FF008310]':' hover:bg-[#F7F7F7]'}`}>
          <span className={`text-[10px] px-2 py-0.5 rounded font-semibold ${i===idx?'bg-[#FF0083] text-white':'bg-[#F3F4F6] text-[#9CA3AF]'}`}>{r.ty}</span>
          <div className="flex-1 min-w-0"><p className={`text-[14px] font-medium truncate ${i===idx?'text-[#FF0083]':'text-[#1A1A2E]'}`}>{r.nm}</p><p className="text-[11px] text-[#9CA3AF] truncate">{r.sub}</p></div>
          {i===idx&&<span className="text-[11px] text-[#9CA3AF]">{"\u21B5"}</span>}
        </button>)}
      </div>:<div className="py-12 text-center">
        {query?<><EmptyIllustration type="search"/><p className="text-[14px] text-[#9CA3AF] mt-2">No results for "{query}"</p><p className="text-[12px] text-[#D1D5DB] mt-1">Try a different search term</p></>
        :<><p className="text-[14px] text-[#6B7280] font-medium">Quick Search</p><p className="text-[12px] text-[#9CA3AF] mt-1">Search employees, skills, contributions, events...</p></>}
      </div>}
      <div className="px-5 py-2.5 border-t border-[#E5E7EB] flex items-center gap-4 bg-[#FAFAFA]">
        <span className="text-[11px] text-[#9CA3AF]"><kbd className="font-mono border border-[#E5E7EB] rounded px-1 py-0.5 mr-1">{"\u2191\u2193"}</kbd> Navigate</span>
        <span className="text-[11px] text-[#9CA3AF]"><kbd className="font-mono border border-[#E5E7EB] rounded px-1 py-0.5 mr-1">{"\u21B5"}</kbd> Select</span>
        <span className="text-[11px] text-[#9CA3AF]"><kbd className="font-mono border border-[#E5E7EB] rounded px-1 py-0.5 mr-1">esc</kbd> Close</span>
      </div>
    </div>
  </div>
};

const TourOverlay=({step,steps,onNext,onSkip})=>{
  const[pos,setPos]=useState(null);
  useEffect(()=>{
    const isMob=window.innerWidth<1024;const sel=steps[step].selector;
    const el=document.querySelector(sel);
    if(!el)return;
    if(isMob&&sel===".tour-sidebar"){const hb=document.querySelector('header button, nav button, .flex.items-center button');if(hb&&el.getBoundingClientRect().left<0)hb.click()}
    el.scrollIntoView({behavior:'smooth',block:'nearest',inline:'nearest'});
    const update=()=>{const r=el.getBoundingClientRect();const clamp=(v,mn,mx)=>Math.max(mn,Math.min(v,mx));setPos({top:clamp(r.top,0,window.innerHeight-100),left:clamp(r.left,0,window.innerWidth-50),width:Math.min(r.width,window.innerWidth),height:Math.min(r.height,window.innerHeight-r.top)})};setTimeout(update,400);update();
  },[step,steps]);
  if(pos===null)return null;
  const s=steps[step];
  const pad=8;
  const tipW=Math.min(300,window.innerWidth-32);
  let tipStyle={};
  const maxTop=window.innerHeight-240;
  const maxLeft=window.innerWidth-tipW-16;
  const isMobile=window.innerWidth<768;
  if(isMobile){tipStyle={top:Math.min(pos.top+pos.height+pad+12,maxTop),left:Math.max(8,Math.min((window.innerWidth-tipW)/2,maxLeft))};if(tipStyle.top+200>window.innerHeight)tipStyle.top=Math.max(8,pos.top-200)}
  else if(s.pos==="right")tipStyle={top:Math.min(pos.top,maxTop),left:Math.min(pos.left+pos.width+pad+12,maxLeft)};
  else if(s.pos==="bottom")tipStyle={top:pos.top+pos.height+pad+12,left:Math.max(8,Math.min(pos.left+pos.width/2-tipW/2,maxLeft))};
  else if(s.pos==="left")tipStyle={top:Math.min(pos.top,maxTop),left:Math.max(8,pos.left-tipW-pad-12)};
  else tipStyle={top:pos.top-160,left:Math.max(8,Math.min(pos.left+pos.width/2-tipW/2,maxLeft))};
  if(tipStyle.top>maxTop)tipStyle.top=maxTop;
  if(tipStyle.top<8)tipStyle.top=8;
  if(tipStyle.left<8)tipStyle.left=8;
  if(tipStyle.left>maxLeft)tipStyle.left=Math.max(8,maxLeft);
  return<div style={{position:"fixed",inset:0,zIndex:200}}>
    <div style={{position:"absolute",inset:0,background:"transparent",boxShadow:`0 0 0 ${pos.top-pad}px rgba(0,0,0,0.5) inset`,clipPath:`polygon(0 0,100% 0,100% 100%,0 100%,0 ${pos.top-pad}px,${pos.left-pad}px ${pos.top-pad}px,${pos.left-pad}px ${pos.top+pos.height+pad}px,${pos.left+pos.width+pad}px ${pos.top+pos.height+pad}px,${pos.left+pos.width+pad}px ${pos.top-pad}px,0 ${pos.top-pad}px)`}} onClick={onSkip}/>
    <div style={{position:"absolute",top:pos.top-pad,left:pos.left-pad,width:pos.width+pad*2,height:pos.height+pad*2,border:"2px solid #FF0083",borderRadius:12,pointerEvents:"none",boxShadow:"0 0 0 9999px rgba(0,0,0,0.5)"}}/>
    <div style={{position:"absolute",...tipStyle,width:tipW,maxWidth:"calc(100vw - 32px)",overflow:"hidden"}} className="bg-white rounded-2xl shadow-2xl p-5 border border-[#E5E7EB]">
      {s.topic&&<span className="text-[9px] font-semibold uppercase tracking-wider px-2 py-0.5 rounded-full bg-[#FF008310] text-[#FF0083] mb-2 inline-block">{s.topic}</span>}
      <div className="flex items-center gap-2 mb-1"><span className="text-[10px] font-bold text-[#9CA3AF] uppercase tracking-wider">Step {step+1} of {steps.length}</span></div>
      <h3 className="text-[16px] font-bold text-[#1A1A2E] mb-1.5">{s.title}</h3>
      <p className="text-[13px] text-[#6B7280] leading-relaxed mb-4">{s.desc}</p>
      <div className="flex items-center justify-between">
        <div className="flex gap-1">{steps.map((_,i)=><div key={i} className="w-1.5 h-1.5 rounded-full" style={{background:i===step?"#FF0083":i<step?"#FF008350":"#E5E7EB"}}/>)}</div>
        <div className="flex gap-2">
          <button onClick={onSkip} className="text-[12px] text-[#9CA3AF] font-medium hover:text-[#6B7280]">Skip</button>
          <button onClick={onNext} className="bg-[#FF0083] text-white text-[12px] font-bold px-4 py-1.5 rounded-lg btn-p">{step===steps.length-1?"Finish":"Next"}</button>
        </div>
      </div>
    </div>
  </div>
};

const getInsight=(scr,role,emp)=>{
  if(!emp)return null;
  if(scr==='skills'){const toVerify=emp.sk.filter(s=>s.lv==='proficient'&&s.sr!=='manager-verified').length;if(toVerify>0)return{tx:`You have ${toVerify} skill${toVerify>1?'s':''} ready for verification. Ask your lead!`,ic:'sparkle'}}
  if(scr==='home'&&emp.hp<70)return{tx:`Your health score is ${emp.hp} \u2014 below target. Let\u2019s identify what\u2019s blocking you.`,ic:'alert'};
  if(scr==='ai-usage'){const avg=emp.co.length?Math.round(emp.co.reduce((s,c)=>s+c.ai,0)/emp.co.length):0;if(avg>60)return{tx:`Your avg AI usage is ${avg}% \u2014 above team average. Here\u2019s how to build more craft.`,ic:'robot'}}
  if(scr==='contributions'&&emp.co.filter(c=>c.st==='in-review').length>0)return{tx:`You have ${emp.co.filter(c=>c.st==='in-review').length} contribution(s) waiting for review. Follow up!`,ic:'clock'};
  if(scr==='home'&&emp.day<=5)return{tx:`Welcome to Week 1! Focus on absorbing culture and setting up your environment.`,ic:'seedling'};
  if(scr==='team'&&role==='lead')return{tx:`Check your team\u2019s pulse \u2014 any health scores below 65 need attention.`,ic:'heart-fill'};
  if(scr==='alerts'&&role==='lead')return{tx:`Review critical alerts first. Data shows early intervention improves retention by 40%.`,ic:'alert'};
  return null;
};

const getFollowUps=(text)=>{
  const t=text.toLowerCase();
  if(t.includes('skill'))return["How do I get a skill verified?","What skills should I learn next?"];
  if(t.includes('ai')||t.includes('contribution'))return["What's a good AI/human balance?","Show me best practices"];
  if(t.includes('health')||t.includes('score'))return["How is health calculated?","How to improve my score?"];
  if(t.includes('team')||t.includes('squad'))return["Who should I talk to?","Tell me about team rituals"];
  return["What should I focus on today?","Tell me about Lemonade culture"];
};

// ───────────────── SPRINT 6: SPOTLIGHT CARD (#28) ─────────────────
const spotlightMaker=(emps)=>{
  if(!emps||emps.length===0)return null;
  return emps.map(e=>{
    const contribScore=Math.min(100,e.co.length*15);
    const healthScore=e.hp;
    const verifiedCount=e.sk.filter(s=>s.sr==="manager-verified").length;
    const skillScore=Math.min(100,verifiedCount*33);
    const total=contribScore*.4+healthScore*.3+skillScore*.3;
    return{...e,score:Math.round(total),contribScore,healthScore:e.hp,skillScore,verifiedCount};
  }).sort((a,b)=>b.score-a.score)[0];
};
const spotlightWhy=(s)=>{
  const parts=[];
  if(s.contribScore>=60)parts.push(`${s.co.length} contributions shipped`);
  if(s.hp>=80)parts.push(`health score at ${s.hp}`);
  if(s.verifiedCount>0)parts.push(`${s.verifiedCount} verified skill${s.verifiedCount>1?"s":""}`);
  return parts.length?parts.join(", ")+".":`Strong overall onboarding performance with a score of ${s.score}.`;
};

const VideoIntro=({onDone})=>{
  const videoRef=useRef(null);
  const[showCta,setShowCta]=useState(false);
  const[isPlaying,setIsPlaying]=useState(false);
  const[isMuted,setIsMuted]=useState(false);
  const isMobile=typeof window!=='undefined'&&window.innerWidth<768;
  useEffect(()=>{
    const skipTimer=setTimeout(()=>setShowCta(true),isMobile?3000:8000);
    const v=videoRef.current;
    if(!v)return;
    const onPlay=()=>setIsPlaying(true);
    const onPause=()=>setIsPlaying(false);
    const onEnd=()=>{setShowCta(true);setIsPlaying(false)};
    v.addEventListener('play',onPlay);
    v.addEventListener('pause',onPause);
    v.addEventListener('ended',onEnd);
    // Try unmuted first; if browser blocks it, fallback to muted autoplay
    v.muted=false;
    v.play().catch(()=>{v.muted=true;setIsMuted(true);v.play().catch(()=>{})});
    return()=>{clearTimeout(skipTimer);v.removeEventListener('play',onPlay);v.removeEventListener('pause',onPause);v.removeEventListener('ended',onEnd)};
  },[]);
  const skip=()=>{sessionStorage.setItem('amj-video-seen','1');onDone()};
  const togglePlay=()=>{
    if(!videoRef.current)return;
    if(videoRef.current.paused)videoRef.current.play().catch(()=>{});
    else videoRef.current.pause();
  };
  const toggleMute=()=>{
    if(!videoRef.current)return;
    videoRef.current.muted=!videoRef.current.muted;
    setIsMuted(videoRef.current.muted);
  };
  return<div style={{position:'fixed',inset:0,zIndex:9999,background:'linear-gradient(135deg,#FFFFFF 0%,#FFF5F9 40%,#FAFAFA 100%)',display:'flex',flexDirection:'column',overflow:'hidden'}}>
    {/* Video area */}
    <div style={{flex:1,position:'relative',overflow:'hidden',display:'flex',alignItems:'center',justifyContent:'center',background:'linear-gradient(135deg,#FFFFFF 0%,#FFF5F9 40%,#FAFAFA 100%)'}}>
      <video ref={videoRef} src="amj-showcase.mp4" playsInline
        style={{width:'100%',height:'100%',objectFit:'contain',maxWidth:'100vw',maxHeight:isMobile?'calc(100vh - 60px)':'calc(100vh - 60px)'}}
      />
      {/* Play/Pause overlay */}
      <div onClick={togglePlay} style={{position:'absolute',inset:0,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>
        {!isPlaying&&<div style={{width:72,height:72,borderRadius:36,background:'rgba(255,0,131,0.9)',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 6px 24px rgba(255,0,131,0.3)'}}>
          <div style={{width:0,height:0,borderTop:'14px solid transparent',borderBottom:'14px solid transparent',borderLeft:'22px solid white',marginLeft:5}}/>
        </div>}
      </div>
      {/* Unmute button — top right */}
      <button onClick={toggleMute} style={{position:'absolute',top:isMobile?12:20,right:isMobile?12:20,width:44,height:44,borderRadius:22,background:'rgba(255,255,255,0.9)',border:'1px solid #E5E7EB',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',boxShadow:'0 2px 12px rgba(0,0,0,0.08)',backdropFilter:'blur(8px)',zIndex:10}}>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={isMuted?"#9CA3AF":"#FF0083"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          {isMuted?<><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></>:<><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></>}
        </svg>
      </button>
    </div>
    {/* Buttons bar */}
    <div style={{flexShrink:0,display:'flex',gap:12,alignItems:'center',justifyContent:'center',padding:'10px 16px',paddingBottom:'max(10px, env(safe-area-inset-bottom))',background:'#FAFAFA',borderTop:'1px solid #E5E7EB',zIndex:10000}}>
      {showCta&&<button onClick={skip} style={{padding:'12px 28px',borderRadius:12,background:'#FF0083',color:'white',border:'none',fontSize:isMobile?15:18,fontWeight:800,cursor:'pointer',boxShadow:'0 4px 16px rgba(255,0,131,.25)',fontFamily:'Lato,sans-serif',whiteSpace:'nowrap'}}>
        Enter the App →
      </button>}
      <button onClick={skip} style={{padding:'10px 18px',borderRadius:10,background:'rgba(0,0,0,.03)',color:'#9CA3AF',border:'1px solid #E5E7EB',fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:'Lato,sans-serif',whiteSpace:'nowrap'}}>
        Skip Video
      </button>
    </div>
  </div>
};
