const getInitialNotifs=(role,prof,employees,leadName)=>{
  if(role==="strategy") return NOTIFS_STRATEGY.map(n=>({...n}));
  if(role==="lead"){
    const team=employees||[];
    const low=team.find(e=>e.hp<65);
    const makers=team.slice(0,5);
    return NOTIFS_LEAD.map(n=>{
      let tx=n.tx;
      let emp=n.emp||null;
      if(low){tx=tx.replace("{low_hp}",low.nm);if(emp)emp=emp.replace("{low_hp_id}",low.id);}
      else{tx=tx.replace("{low_hp} health score dropped below 60 — needs attention","Team health looks good — all makers above 65");emp=null;}
      for(let i=0;i<5;i++){
        tx=tx.replace(`{maker${i+1}}`,makers[i]?makers[i].nm:"A maker");
        if(emp&&makers[i])emp=emp.replace(`{maker${i+1}_id}`,makers[i].id);
      }
      return {...n,tx,emp};
    });
  }
  const notifsByProf=NOTIFS_MAKER[prof]||NOTIFS_MAKER.Engineer;
  return notifsByProf.map(n=>({...n,tx:n.tx.replace("{lead}",leadName||"Your lead")}));
};

    body:[
      {h:"Overview",p:"Lemonade offers insurance products across multiple markets, all built on our AI-first platform. AI Maya can generate policies in under a minute, and claims can be settled in as few as 3 seconds by AI Jim. With nearly 3 million customers and $1.24 billion in-force premiums (end of 2025, up 31% YoY), Lemonade brought in $738 million in revenue during 2025, up 40% year-over-year. Founded in 2015 by Daniel Schreiber and Shai Wininger (co-founder of Fiverr), the company went public in 2020 and operates with about 1,300 employees across offices in New York City (HQ), Tel Aviv, and operations throughout the US, UK, and Europe. We are an AI company doing insurance — not a traditional insurer using AI. As a certified B-Corp and Public Benefit Corporation, everything we build is guided by the mission of turning insurance into a social good."},
      {h:"Renters & Homeowners",p:"Our flagship product line. Renters insurance starts from $5/mo, covering personal property, liability, and additional living expenses with a seamless AI-powered signup experience through AI Maya. Homeowners insurance starts from $25/mo and holds a 4.9-star rating from over 62,000 reviews, reflecting exceptional customer satisfaction. Both products use our AI-first underwriting engine, which evaluates 1,000+ data points per policy — compared to roughly 20 in traditional insurance — to price risk accurately and deliver instant quotes. The renters and homeowners lines remain the core of our business, and the combination of transparent pricing, fast claims, and the Giveback model gives us a strong competitive position in the market."},
      {h:"Pet Insurance",p:"Starting from $10/mo, our pet insurance covers dogs and cats for accidents and illness, with flexible plan options that let pet owners customize deductibles and coverage limits. Pet insurance in-force premiums reached $283 million in 2024, up 57% year-over-year, making it one of our fastest-growing product lines. Over 50% of pet claims are handled instantly by AI Jim, delivering a seamless experience for pet owners during stressful moments when their animals need care. Key differentiators include transparent claim handling, no hidden gotchas, and behavioral economics built into the product design to align customer and company incentives. The pet insurance market is large and underpenetrated, and Lemonade is well-positioned to capture share through superior technology and customer experience."},
      {h:"Car Insurance",p:"Car insurance is available and expanding following Lemonade's acquisition of Metromile, which brought per-mile pricing technology and a base of existing policyholders. In January 2026, we launched Autonomous Car Insurance for Tesla Full Self-Driving vehicles, starting in Arizona and Oregon — offering up to 50% lower rates for FSD miles by integrating directly with the Tesla Fleet API. This is the first product of its kind in the industry, using real-time telematics data to differentiate between human-driven and autonomously driven miles. The car insurance product represents a significant growth opportunity as we expand into more states, and the Tesla FSD product positions Lemonade at the forefront of the autonomous vehicle insurance market."},
      {h:"Term Life",p:"Starting from $8/mo, term life policies offer fast AI-driven decisioning that removes the traditional weeks-long underwriting process. Our underwriting engine analyzes applicant data to provide quotes quickly, making life insurance accessible and frictionless. The term life product extends our relationship with customers beyond property and casualty, creating opportunities for cross-selling and deepening customer lifetime value. Life insurance at Lemonade follows the same principles as our other products: transparent pricing, simple language, and an AI-first approach to underwriting."},
      {h:"The Giveback",p:"Lemonade takes a flat 25% fee from premiums. The rest pays claims. Any leftover money goes to nonprofits that customers choose during signup — our Giveback program. Millions have been donated since 2017 through the Giveback program, supporting causes across food security, animal welfare, community support, environmental protection, and emergency response. In 2025 alone, $2.1 million went to 45 nonprofits worldwide. This is not charity — it is a structural feature designed with behavioral economics to align incentives and reduce fraud. Because leftover premiums go to causes customers care about, there is no incentive to inflate claims. Dan Ariely, our Chief Behavioral Officer, designed this model to remove the adversarial dynamic that plagues traditional insurance."},
      {h:"How Products Work Together",p:"Lemonade's product strategy is built around becoming a customer's full insurance provider over time. A renter who starts with a $5/mo policy may later need homeowners, pet, car, and life insurance — and Lemonade aims to serve all of those needs on a single platform. Cross-selling is powered by AI Maya, which can identify upsell opportunities during natural customer interactions. Our unified data platform means that every product benefits from shared underwriting models, claims infrastructure, and customer insights. With $1.24 billion in-force premiums and nearly 3 million customers, the cross-sell opportunity is substantial and growing. The trailing-12-month gross loss ratio of 64% at end of 2025 — well below the 75% sweet-spot target — demonstrates that growth and profitability can go hand in hand."}
    ]},
  {id:"r2",ct:"Product",ti:"Claims 101",ds:"How claims flow from filing to resolution in our AI-first system",tm:"25 min",rl:"All",au:"Claims Engineering",dt:"Feb 2026",
    body:[
      {h:"The Claims Pipeline",p:"Every claim at Lemonade flows through our AI-first pipeline: Filing → AI Jim Triage → Investigation → Decision → Payment. Customers file claims by recording a short video describing the incident, and AI Jim can settle claims in as few as 3 seconds. On average, AI Jim tracks 3.7 million signals per claim to make its decisions. This pipeline is the engine that powers our customer promise: instant, transparent, and fair claims handling. The speed and accuracy of our claims process is a core reason Lemonade maintains a 4.9-star rating on homeowners insurance and strong customer loyalty across all product lines."},
      {h:"AI Jim — Automated Claims",p:"Roughly 55% of claims are fully automated end-to-end by AI Jim, without human intervention. 96% of the time, it is AI Jim that takes the first notice of loss without human intervention — meaning the vast majority of customers interact only with AI when filing a claim. For pet insurance, over 50% of claims are handled instantly. AI Jim cross-references policy data, video evidence, and third-party databases to make decisions, tracking 3.7 million signals on average per claim. For flagged or complex cases, it escalates to human claims specialists via Blender — our internal claims tool. Our loss adjustment expense ratio is just 6%, compared to an industry average of approximately 9%, reflecting the efficiency of AI-driven claims processing. This efficiency translates directly into better unit economics and the ability to pass savings on to customers."},
      {h:"Blender & Human Specialists",p:"Blender is the internal tool where claims specialists see AI Jim's assignments, coverage determinations, risk alerts, and supplier dispatch information. When AI Jim escalates a claim, specialists get a full context package including AI Jim's analysis, recommended actions, and risk scores. This means human specialists spend their time on genuinely complex cases rather than routine processing. The system learns from every human decision to improve future automation, creating a virtuous cycle where AI Jim gets smarter over time. Blender also provides dashboards for claims managers to monitor queue depth, resolution times, and specialist performance."},
      {h:"Fraud Detection",p:"Our Forensic Graph technology maps relationships between claims, policies, and external data to detect fraud patterns. It catches coordinated fraud rings that traditional systems miss, analyzing network effects and behavioral signals that would be invisible to human reviewers working individual cases. False positive rate: <2%, which means we rarely inconvenience honest customers. Combined with Dan Ariely's behavioral economics principles (our Chief Behavioral Officer), the Giveback model structurally reduces fraud incentives — customers know their unused premiums go to charity, so there is less motivation to inflate claims. This dual approach of technological detection and behavioral design makes Lemonade's fraud management uniquely effective."},
      {h:"Video Claims",p:"Customers describe what happened by recording a short video on their phone. This approach reduces friction, captures genuine emotion, and provides rich data for AI Jim's analysis. The video-first claims process is a core differentiator in how Lemonade reimagines insurance from first principles. Video claims also serve as a natural fraud deterrent — research in behavioral economics shows that people are less likely to be dishonest when they are speaking directly to a camera. The video data feeds into our AI models to improve claim assessment accuracy over time."},
      {h:"Claims Metrics That Matter",p:"Every team member should understand the key claims metrics: claims frequency (how often claims are filed per policy), claims severity (average payout per claim), loss ratio (claims paid divided by premiums earned), and loss adjustment expense ratio (the cost of processing claims). The trailing-12-month gross loss ratio reached a record low of 64% at end of 2025, well below the company's 75% sweet-spot target. Our loss adjustment expense ratio of 6% — versus an industry average of approximately 9% — demonstrates that AI-first claims processing delivers real economic advantages. These metrics are reviewed daily by product, geography, and cohort."},
      {h:"How You Impact Claims",p:"Every Maker at Lemonade has a role in the claims experience, whether directly or indirectly. Engineers build and improve the AI Jim pipeline, Blender interface, and Forensic Graph. Designers shape the claim filing experience that nearly 3 million customers interact with. PMs define the product strategy that determines what gets automated and what stays human. Even small improvements in claim processing speed, accuracy, or customer communication compound across millions of interactions annually. Use the claims dashboards in Looker to see how your squad's work impacts claim resolution times and customer satisfaction scores."}
    ]},
  {id:"r3",ct:"Product",ti:"Product Values",ds:"How we make product decisions — customer-first, AI-native, transparent",tm:"20 min",rl:"All",au:"Product Leadership",dt:"Jan 2026",
    body:[
      {h:"Customer-First",p:"Every product decision starts with the customer. We use behavioral data, support tickets, NPS feedback, and Mixpanel analytics to identify pain points and opportunities. If a feature does not measurably improve the customer experience, it does not ship. Our Chief Behavioral Officer, Dan Ariely, applies behavioral economics to ensure our products align customer incentives with honest behavior — reducing fraud structurally rather than policing it. With nearly 3 million customers, we have rich data on how people interact with insurance, and we use that data to make the experience better for everyone. The customer-first value is not just a slogan — it is a decision-making framework that resolves ambiguity when priorities conflict."},
      {h:"AI-Native, Not AI-Added",p:"Lemonade is not a traditional insurer using AI — we are an AI company doing insurance. We do not bolt AI onto existing processes. We design workflows where AI is the primary operator and humans provide oversight for complex cases. This means rethinking insurance from first principles, not digitizing paper forms. AI Maya signs up customers in under a minute and is available 24/7. Roughly 55% of claims are fully automated end-to-end by AI Jim, and 96% of the time it is AI Jim that takes the first notice of loss. CX.AI handles approximately 30% of customer inquiries. Cooper manages internal engineering workflows and monitors NASA satellite data for wildfire detection. Blender and Forensic Graph complete the AI ecosystem. All these systems are built in-house as core platforms, not third-party integrations."},
      {h:"Radical Transparency",p:"Our Policy 2.0 is written in plain English — a transparent, open-source insurance policy that anyone can read and understand. We publish our loss ratios publicly. We take a flat 25% fee and give back the rest through Giveback. Transparency is not just a value — it is a competitive advantage that builds trust with customers who have learned to be skeptical of insurance companies. We are a B-Corp certified company and a Public Benefit Corporation, which means we are legally committed to considering the impact of our decisions on all stakeholders, not just shareholders. This transparency extends to how we communicate with customers about AI usage and how we handle claims."},
      {h:"Social Good & Giveback",p:"Millions have been donated since 2017 through the Giveback program, supporting causes across food security, animal welfare, community support, environmental protection, and emergency response. In 2025 alone, $2.1 million went to 45 nonprofits worldwide. This model, designed with behavioral economics by Dan Ariely, means customers have no incentive to inflate claims — leftover premiums help causes they care about. Insurance should be a social good, not just a financial product. Every Maker should understand how Giveback works because it shapes customer expectations and behavior in ways that affect every product decision we make."},
      {h:"Ship Fast, Learn Faster",p:"We run A/B tests continuously across all product surfaces. Every feature ships with built-in measurement and success criteria defined before development begins. We would rather launch a good feature tomorrow than a perfect one next month, because real user data is more valuable than internal debate. Our culture is a fast-paced, ever-changing, zero-politics meritocracy where the best ideas win regardless of who proposes them. This velocity is enabled by our strong CI/CD pipeline, feature flags for controlled rollouts, and a culture that treats failures as learning opportunities rather than career risks. With $738 million in revenue during 2025 (up 40% YoY), speed of iteration is a core competitive advantage."}
    ]},
  {id:"r4",ct:"Product",ti:"CX 101",ds:"Customer experience principles and how we measure satisfaction",tm:"20 min",rl:"All",au:"CX Team",dt:"Feb 2026",
    body:[
      {h:"CX Philosophy",p:"At Lemonade, CX is not a department — it is a product feature. Every interaction a customer has with Lemonade, from getting a quote to filing a claim to asking a question, is designed as a product experience. CX.AI, our customer support bot, handles approximately 30% of customer inquiries without human intervention. AI Maya handles sales conversations and onboarding 24/7, generating policies in under a minute. When humans step in, they have full context from AI analysis, so customers never have to repeat themselves. The goal: every interaction should feel effortless. With nearly 3 million customers, every CX improvement creates meaningful impact at scale."},
      {h:"Key Metrics",p:"We track NPS (Net Promoter Score), CSAT (Customer Satisfaction), first response time, and resolution time at the squad level. Our homeowners product holds a 4.9-star rating from over 62,000 reviews, reflecting consistent excellence in customer experience. These metrics are reviewed weekly and shared in squad dashboards — every team member should know how their work impacts satisfaction scores. Beyond aggregate metrics, we also track per-interaction sentiment through automated analysis of customer messages and call recordings. Trends in these metrics inform product priorities and resource allocation."},
      {h:"The CX Stack",p:"CX.AI routes and resolves customer inquiries automatically, using natural language processing to understand intent and provide accurate responses. For claims, specialists use Blender — our internal claims tool — to see AI Jim's assignments, coverage determinations, risk alerts, and supplier dispatch information. Every CX interaction feeds back into our product improvement pipeline through automated tagging and sentiment analysis. The CX stack also includes escalation workflows that ensure complex issues reach the right specialist quickly, and quality monitoring tools that help managers coach their teams. This integrated approach keeps our loss adjustment expense ratio at 6%, well below the industry average of approximately 9%."},
      {h:"CX Across Product Lines",p:"Each product line has distinct CX patterns and challenges. Renters and homeowners CX focuses on policy modifications, coverage questions, and weather-related claim surges. Pet insurance CX often involves emotionally charged situations where empathy is as important as speed — over 50% of pet claims are handled instantly by AI Jim, which reduces stress during difficult moments. Car insurance CX includes claims that may involve third parties, police reports, and repair shops. Life insurance CX tends to be lower volume but higher complexity, involving beneficiary changes and coverage questions. Understanding these differences helps every Maker appreciate the diversity of customer needs."},
      {h:"How You Impact CX",p:"Every bug you fix, every feature you ship, every design you improve directly affects customer experience. With nearly 3 million customers, small improvements compound quickly across millions of interactions annually. Engineers who reduce API latency improve the responsiveness of AI Maya conversations. Designers who simplify the claim filing flow reduce drop-off and customer frustration. PMs who prioritize the right features address the pain points that matter most. Use Mixpanel for product analytics and Looker for business metrics to see how your work impacts satisfaction scores. Understand the connection between your squad's work and the customer journey — and use that understanding to make better decisions about what to build next."}
    ]},
  {id:"r5",ct:"Product",ti:"Risk Overview",ds:"How insurance risk works and Lemonade's approach to underwriting",tm:"25 min",rl:"All",au:"Risk Team",dt:"Jan 2026",
    body:[
      {h:"Insurance Risk Basics",p:"Insurance is fundamentally about pooling risk. Premiums from many policyholders fund claims from the few. The key challenge: pricing risk accurately so premiums cover claims while remaining competitive. Lemonade's flat 25% fee model means we take a fixed cut — the rest pays claims, and leftovers go to Giveback. This removes the traditional insurer's incentive to deny claims, because Lemonade does not profit by denying legitimate claims. Understanding this fundamental difference is essential for every Maker — it shapes how we build products, how we design customer interactions, and how we think about long-term growth."},
      {h:"Our Underwriting Engine",p:"Lemonade uses 1,000+ data points per policy (vs. ~20 in traditional insurance). Our ML models process property data, demographic data, geographic risk, and behavioral signals to generate real-time pricing that is both accurate and competitive. Dan Ariely's behavioral economics research, as our Chief Behavioral Officer, shapes how we design products that structurally reduce fraud by aligning customer incentives. The underwriting engine is continuously learning: every policy written and every claim filed feeds back into the models, making them more precise over time. This data advantage compounds — the more customers we serve, the better our risk assessment becomes, which enables more competitive pricing, which attracts more customers."},
      {h:"Loss Ratio Deep Dive",p:"The trailing-12-month gross loss ratio reached a record low of 64% at end of 2025, well below the company's 75% sweet-spot target. This dramatic improvement reflects better underwriting models, more accurate pricing, and the compounding effect of AI-driven risk selection. We monitor loss ratio daily by product, geography, and cohort. In 2024, Lemonade achieved its first full year of positive adjusted free cash flow. Understanding loss ratio and its trajectory is critical for every team member — it is the single most important metric for the long-term health of an insurance business. A loss ratio that is too high means we are underpricing risk; too low could mean we are overpricing and losing competitive position. The 75% sweet-spot target balances profitability with competitive pricing."},
      {h:"Reinsurance & Catastrophe Management",p:"We transfer a portion of risk to reinsurance partners, which protects us from catastrophic events like hurricanes, wildfires, and other natural disasters. This allows us to grow without proportional capital requirements. With $1.24 billion in-force premiums at end of 2025 and 31% YoY growth, our reinsurance strategy is a key enabler of scale. Cooper, our internal engineering bot, also monitors NASA satellite data for wildfire detection as part of Project Watchtower, giving us early warning capabilities that help protect our policyholders and manage catastrophe exposure proactively. Reinsurance treaties are negotiated annually and are structured to balance cost with coverage breadth."},
      {h:"Risk by Product Line",p:"Each product line has distinct risk characteristics. Renters insurance has relatively low severity but high frequency of small claims. Homeowners insurance involves higher severity risks including weather damage and liability. Pet insurance sees frequent claims but with more predictable severity patterns — pet insurance in-force premiums reached $283 million in 2024, up 57% YoY. Car insurance introduces telematics-based risk assessment, and our Tesla FSD product launched in January 2026 differentiates risk between human and autonomous driving. Term life has long-tail risk that requires different actuarial models. Understanding these differences helps every team member appreciate why product-specific strategies matter."},
      {h:"Revenue & Financial Context",p:"Lemonade brought in $738 million in revenue during 2025, up 40% year-over-year. This growth is driven by both new customer acquisition and expansion of in-force premiums per customer. The company's financial health is improving across all key metrics: revenue growth, loss ratio improvement, and progress toward sustained profitability. Every Maker should understand how their work contributes to these financial outcomes — whether through improving conversion rates (more customers), reducing claims costs (better AI), or increasing retention (better customer experience). The trailing-12-month gross loss ratio of 64% at end of 2025 demonstrates that growth and profitability can coexist."}
    ]},

  {id:"r6",ct:"Engineering",ti:"Lemonade Architecture Overview",ds:"Microservices, event-driven design, and AI integration patterns",tm:"35 min",rl:"Engineer",au:"Platform Team",dt:"Feb 2026",
    body:[
      {h:"Architecture Philosophy",p:"Lemonade runs on a microservices architecture with event-driven communication and REST APIs for synchronous calls. Each squad owns their domain services end-to-end, from code through deployment, monitoring, and on-call rotation. Our approach is AI-first — AI systems like Maya, AI Jim, CX.AI, Cooper, and Forensic Graph are core services, not add-ons bolted onto legacy infrastructure. This architecture supports nearly 3 million customers and $1.24 billion in-force premiums, processing millions of interactions daily across quotes, claims, policy management, and customer support. The system is designed for horizontal scalability, allowing us to grow without rearchitecting."},
      {h:"Tech Stack",p:"Our primary languages are Python and TypeScript. We use React and TypeScript on the frontend through our unified platform called Uniclient, and React Native for mobile applications. Docker and NGINX are part of our infrastructure stack. We follow data-mesh principles for our data platform, meaning each domain team owns their data products and exposes them through well-defined contracts. For GenAI work, we use RAG (retrieval-augmented generation), function calling, and agent-based architectures. The data platform is central to everything we do — our pricing engine evaluates 1,000+ data points per policy, AI Jim tracks 3.7 million signals per claim, and Forensic Graph maps complex relationship networks for fraud detection."},
      {h:"Key Services",p:"Policy Service manages the full policy lifecycle from quote to bind to renewal to cancellation. Claims Service handles the AI Jim claims pipeline, routing roughly 55% of claims to full automation and escalating complex cases to human specialists via Blender. Pricing Service generates real-time quotes using 1,000+ data points and ML models, including the new Tesla FSD autonomous car insurance pricing that integrates with the Tesla Fleet API. AI Gateway routes requests to ML models and manages model versioning, A/B testing, and fallback logic. Notification Service handles multi-channel messaging across email, push, SMS, and in-app notifications. Cooper is our internal engineering bot managing workflows, task allocation, testing, and code deployment — it also monitors NASA satellite data for wildfire detection as part of Project Watchtower."},
      {h:"Data Platform & ML Infrastructure",p:"Our data platform follows data-mesh principles, where each domain team owns their data products. The ML infrastructure supports model training, evaluation, deployment, and monitoring at scale. Models power pricing, claims automation, fraud detection, customer segmentation, and risk assessment. We use feature stores to ensure consistent feature computation across training and serving. Model performance is monitored continuously with automated alerts for drift and degradation. The data platform processes data from nearly 3 million customers across all product lines, generating insights that improve every part of the business."},
      {h:"Development Flow",p:"The development flow follows a well-defined path: Feature branch → PR → Code review (2 approvals required, 1 from squad, 1 from outside) → CI pipeline (tests, lint, security scan via Snyk) → Staging deploy → QA sign-off → Production canary deploy → Full rollout. We practice continuous deployment with strong quality gates at every stage. PRs must pass all automated checks before review. Staging must be green for 1 hour before production deploy. Canary deploys are monitored for error rate and latency regressions before full rollout. This process balances speed with safety — we ship frequently but with confidence."},
      {h:"Observability & Incident Management",p:"We use structured logging, metrics, and alerting across all services, with Datadog as the primary observability platform for monitoring latency, error rates, and uptime. Each squad maintains dashboards for their domain and is responsible for their service health. We practice blameless postmortems for all Sev1 and Sev2 incidents, focusing on systemic improvements rather than individual blame. Cooper also monitors NASA satellite data for wildfire detection as part of Project Watchtower, providing early warning to our risk and claims teams. On-call rotation is per squad with 1-week shifts, primary and secondary responders, and an expected Sev1 response time of 5 minutes."},
      {h:"Security & Compliance",p:"Insurance data is highly regulated, and our architecture reflects this. We comply with state insurance regulations across all US markets and EU data protection requirements including GDPR for our European operations. Security scans run on every PR through Snyk. We follow least-privilege access principles and maintain audit trails for all sensitive data access. AI models are audited for bias and we comply with EU AI Act requirements. Our Policy 2.0 is written in plain English as an open-source insurance policy — this transparency extends to our technical practices as well."}
    ]},
  {id:"r7",ct:"Engineering",ti:"RnD Intro",ds:"How R&D is structured — squads, tech leads, deployment flow",tm:"25 min",rl:"Engineer",au:"VP Engineering",dt:"Jan 2026",
    body:[
      {h:"Squad Structure",p:"R&D is organized into cross-functional product squads, each with engineers, a designer, and a PM. Squads own their domain end-to-end: code, deployment, monitoring, and on-call rotation. Key team areas include Product Core, Insurance AI, and Growth — each focusing on different aspects of the Lemonade platform. This structure ensures that decisions are made close to the work and that teams have full ownership of their outcomes. With about 1,300 employees (Lemonade Makers) across offices in New York City (HQ), Tel Aviv, and operations throughout the US, UK, and Europe, the squad model keeps teams small and agile despite the company's scale."},
      {h:"Tech Leads & Engineering Leadership",p:"Each squad has a tech lead responsible for architectural decisions, code quality standards, and mentoring engineers. Tech leads meet weekly to align on cross-cutting concerns, platform investments, and technical debt prioritization. The tech lead role is both technical and people-oriented — they are expected to write code, review PRs, and mentor junior engineers while also representing their squad's technical needs in broader planning discussions. Tech leads report to engineering directors who oversee multiple squads within a domain area."},
      {h:"Sprint Rhythm & Ceremonies",p:"We run 2-week sprints starting Monday. Sprint planning happens Monday morning, with daily standups to surface blockers and coordinate work. Sprint review and retrospective occur every other Friday. We use Jira for sprint management and Monday.com for quarterly planning. Our culture is a fast-paced, ever-changing, zero-politics meritocracy where the best ideas win regardless of seniority. Retrospectives are taken seriously — every retro produces concrete action items that are tracked to completion. Sprint velocity is calculated automatically in Monday.com and used for capacity planning, not performance evaluation."},
      {h:"On-Call & Incident Response",p:"Rotating on-call per squad with 1-week shifts and both primary and secondary responders. Expected response time is 5 minutes for Sev1 incidents (service down, customer impact >1000 users). New joiners shadow on-call for 2 sprints before going primary, ensuring they are familiar with the systems, runbooks, and escalation paths. Cooper, our internal engineering bot, helps manage workflows, task allocation, testing, and code deployment, and can also assist during incidents by pulling up relevant context and runbooks. We practice blameless postmortems for all significant incidents, focusing on systemic improvements."},
      {h:"Engineering Culture & Values",p:"Lemonade engineering is built on a few core principles: own your domain completely, ship frequently with quality, use AI as a tool to amplify your craft, and treat every interaction as a learning opportunity. We believe in transparency — our loss ratios are public, our Policy 2.0 is open-source, and our engineering practices follow the same spirit of openness. Engineers are expected to be data-literate, using Datadog for engineering metrics, Mixpanel for product analytics, and Looker for business metrics. The AI Contribution Log is a unique Lemonade practice where every PR documents AI tool usage, fostering honest reflection about the balance between AI-assisted and human-crafted work."},
      {h:"Your First Two Weeks in Engineering",p:"In your first week, focus on setting up your development environment, getting access to all relevant systems (GitHub, Jira, Datadog, Slack channels), and reading the Architecture Overview article. Shadow your squad's daily standups and ask questions. In your second week, pick up a small task — look for the 'Good First Bug' label in Jira for Sev3/4 issues that are safe to start with. Submit your first PR with the AI Contribution Log, get it reviewed, and experience the full development flow from branch to production. Your lead and buddy are there to help you navigate the codebase and team dynamics."}
    ]},
  {id:"r8",ct:"Engineering",ti:"QA @ Lemonade",ds:"Testing standards, CI/CD pipeline, and quality gates",tm:"20 min",rl:"Engineer",au:"QA Team",dt:"Feb 2026",
    body:[
      {h:"Testing Philosophy",p:"We believe in a testing pyramid: 70% unit tests, 20% integration tests, 10% E2E tests. Every PR must include tests — no exceptions. Target coverage is 80%+ per service, measured and tracked as part of CI. AI-generated tests are welcome but must be reviewed carefully for edge cases, boundary conditions, and insurance-specific business logic. Testing at Lemonade is not just about preventing regressions; it is about building confidence that our systems work correctly for nearly 3 million customers. A single bug in pricing or claims processing can have significant financial and customer impact, so quality is non-negotiable."},
      {h:"CI/CD Pipeline In Detail",p:"GitHub Actions runs on every PR with a defined pipeline: lint → unit tests → integration tests → security scan (Snyk) → build. Merging to main triggers the deployment pipeline: staging deploy → smoke tests → canary production deploy. Full rollout from canary to production is a manual step, giving the team a final checkpoint before changes reach all customers. The CI pipeline typically completes in under 10 minutes for most services. Security scanning via Snyk checks for known vulnerabilities in dependencies and flags issues before they reach production. Build artifacts are versioned and stored for rollback capability."},
      {h:"Quality Gates",p:"PRs need 2 approvals — 1 from within the squad and 1 from outside — to ensure both domain expertise and fresh perspective review every change. All automated checks must pass before a PR can be merged. No force-merges are permitted without explicit tech lead approval, and these are logged for audit. Staging must be green for 1 hour before production deploy, giving time for integration issues to surface. These gates may feel strict, but they are calibrated to the reality that we process insurance for nearly 3 million customers — the cost of a production issue far outweighs the cost of a slightly slower merge process."},
      {h:"Testing AI-Powered Features",p:"Testing AI-powered features requires special attention. AI Jim processes roughly 55% of claims automatically, so any regression in the claims pipeline directly impacts customers. We use a combination of golden test sets (known inputs with expected outputs), property-based testing for ML model behavior, and shadow deployment where new models run alongside current production models before being promoted. Model performance monitoring continues after deployment, with automated alerts for accuracy drift. When testing AI features, always consider edge cases that the training data may not cover — insurance claims are diverse, and unexpected scenarios are common."},
      {h:"E2E Testing & Environments",p:"End-to-end tests run against a staging environment that mirrors production configuration. We maintain dedicated test accounts and synthetic data sets that cover all product lines: renters, homeowners, pet, car, and life insurance. E2E tests cover critical user journeys including quote generation, policy purchase, claim filing, and payment processing. These tests are owned by the squad responsible for each flow and run on a nightly schedule in addition to being triggered by deploys. When E2E tests fail, the deploy pipeline is blocked until the issue is resolved."},
      {h:"QA for New Joiners",p:"As a new engineer, you should familiarize yourself with the test infrastructure during your first week. Run the existing test suite for your squad's services to understand the testing patterns and conventions in use. When submitting your first PR, include unit tests at minimum and integration tests if your change involves service boundaries. Ask your squad's tech lead about any domain-specific testing patterns — for example, pricing tests often require actuarial test fixtures, and claims tests may need mock video data. The AI Contribution Log for your PR should include notes on whether AI helped generate tests and what you modified or added manually."}
    ]},
  {id:"r9",ct:"Engineering",ti:"Reporting & Handling Bugs",ds:"Bug triage process, severity levels, and Jira workflow",tm:"18 min",rl:"Engineer",au:"Engineering Ops",dt:"Jan 2026",
    body:[
      {h:"Severity Levels",p:"Sev1: Service down or data integrity issue, customer impact >1000 users — triggers immediate response with 5-minute SLA. Sev2: Major feature broken, workaround available — goes into current sprint immediately. Sev3: Minor bug, limited impact — groomed into backlog and prioritized in next sprint planning. Sev4: Cosmetic issue, no functional impact — lowest priority, addressed when capacity allows. With nearly 3 million customers, even Sev3 bugs may affect thousands of users, so take all bug reports seriously. When in doubt about severity, err on the side of rating it higher — it is easier to downgrade than to miss a critical issue."},
      {h:"Triage Process",p:"Bugs are reported in Jira with required fields: reproduction steps, environment (production/staging/local), severity level, affected product line, and screenshots or logs where applicable. QA triages the bug queue daily, verifying reproduction steps and adjusting severity as needed. Sev1 and Sev2 bugs go to the current sprint immediately and are assigned to the squad that owns the affected service. Sev3 and Sev4 bugs are groomed into the backlog and prioritized during regular sprint planning. Bug reporters receive status updates when their bug is assigned and when it is resolved. The triage process ensures that nothing falls through the cracks and that the most impactful issues get addressed first."},
      {h:"Writing Good Bug Reports",p:"A good bug report saves the fixing engineer significant investigation time. Include: a clear title that describes the problem (not the symptom), step-by-step reproduction instructions that someone unfamiliar with the feature can follow, expected behavior versus actual behavior, environment details (browser, OS, device, account type), screenshots or screen recordings, and relevant console errors or logs. If the bug is intermittent, note how often it occurs and any patterns you have noticed. Tag the bug with the relevant product line (renters, homeowners, pet, car, life) and the affected platform (web, mobile, internal tools). The more context you provide, the faster the fix."},
      {h:"Your First Bug Fix",p:"Pick a Sev3 or Sev4 bug from the 'Good First Bug' label in Jira — these are specifically curated to be safe starting points for new engineers. Follow the standard PR flow: create a feature branch, make the fix, add tests, submit a PR with 2 reviewers, and tag the original reporter for verification once merged. Include the AI Contribution Log if you used AI tools during the fix. This is a great way to learn the codebase in your first weeks because bug fixes require you to understand existing code, follow coding conventions, and navigate the development workflow end-to-end. Many senior engineers at Lemonade started their first week with a good first bug."},
      {h:"Postmortems & Learning",p:"For Sev1 and Sev2 incidents, we conduct blameless postmortems within 48 hours of resolution. Postmortems document what happened, the timeline of events, the root cause, the impact, and concrete action items to prevent recurrence. Postmortems are shared in the #engineering channel for transparency and learning. As a new engineer, reading recent postmortems is one of the best ways to understand the system — they reveal real failure modes, architectural decisions, and operational practices that documentation alone cannot convey."}
    ]},
  {id:"r10",ct:"Engineering",ti:"Pricing Platform Intro",ds:"How our pricing engine works — models, APIs, and rate management",tm:"25 min",rl:"Engineer",au:"Pricing Team",dt:"Feb 2026",
    body:[
      {h:"How Pricing Works",p:"Our pricing engine evaluates 1,000+ data points per policy in real-time — compared to roughly 20 in traditional insurance. The pipeline: user input → feature extraction → ML model scoring → regulatory compliance check → final price. This data-rich approach allows us to price risk more accurately and offer more competitive rates while maintaining profitability. The pricing engine must respond in milliseconds because it powers the real-time quote experience through AI Maya, where customers expect instant responses. Every product line — renters, homeowners, pet, car, and life — has its own set of pricing models optimized for the specific risk factors in that domain."},
      {h:"Behavioral Economics in Pricing",p:"Dan Ariely, our Chief Behavioral Officer, has shaped how we think about pricing and customer behavior. Our flat 25% fee model and Giveback structure remove the adversarial dynamic of traditional insurance — we do not profit by underpaying claims. By aligning incentives — customers know leftover premiums go to charity — we reduce fraudulent claims structurally rather than through punitive measures. This behavioral design is not just philosophical; it has measurable economic impact. The Giveback model contributes to our record-low trailing-12-month gross loss ratio of 64% at end of 2025, well below the 75% sweet-spot target. Dan Ariely's research on honesty, motivation, and decision-making directly informs how we present pricing information, structure deductible choices, and frame coverage options."},
      {h:"Rate Management & Regulatory Compliance",p:"Insurance rates must be filed with state regulators before they can be used. Our rate management system tracks approved rates per state and automatically applies the correct rating algorithm for each policy. Changes to pricing models or rate tables go through actuarial review before regulatory filing. This process can take weeks to months depending on the state, which means pricing engineers must plan ahead and coordinate with actuarial and legal teams. For our new Tesla FSD autonomous car insurance launched in January 2026 (starting in Arizona and Oregon), we integrate with the Tesla Fleet API to differentiate pricing between human-driven and self-driven miles, offering up to 50% lower rates for FSD miles."},
      {h:"Pricing Data Sources",p:"The 1,000+ data points per policy come from multiple sources: customer-provided information (address, property details, pet breed, vehicle type), third-party data providers (property databases, weather risk models, claims history databases, credit-based insurance scores where permitted), geographic risk models (flood zones, wildfire risk, crime rates), and behavioral signals from the onboarding process. For car insurance, telematics data from the Tesla Fleet API provides real-time driving behavior information. All data sources are validated for accuracy and compliance with state regulations — some data points are restricted in certain states, and the pricing engine must respect these constraints automatically."},
      {h:"Working on the Pricing Platform",p:"If you are an engineer working on the pricing platform, you will need to understand both the technical implementation (Python-based ML models, feature stores, real-time serving infrastructure) and the business domain (insurance pricing concepts, regulatory constraints, actuarial principles). The pricing team works closely with data scientists, actuaries, and product managers to develop and deploy new pricing models. Model changes follow a rigorous process: development and backtesting → peer review → shadow deployment alongside production models → A/B testing with real traffic → full deployment. Understanding loss ratio impact is essential — the trailing-12-month gross loss ratio of 64% reflects the cumulative effect of pricing decisions across the entire portfolio."}
    ]},
  // ── Design ──
  {id:"r11",ct:"Design",ti:"Design at Lemonade",ds:"Design principles, brand guidelines, and the Lemonade visual language",tm:"30 min",rl:"Designer",au:"Design Lead",dt:"Feb 2026",
    body:[
      {h:"Design Principles",p:"Our design principles guide every decision: 1. Clarity over cleverness — insurance is confusing, our UI should not be. Every screen should be self-explanatory without tooltips or documentation. 2. Delight in details — micro-interactions, transitions, and loading states matter. They communicate care and build trust. 3. Mobile-first — 70% of our traffic is mobile, so every design starts with the smallest screen and scales up. 4. Accessible by default — WCAG AA minimum compliance is mandatory, not optional. These principles apply whether you are designing customer-facing flows for nearly 3 million users or internal tools used by our operations teams."},
      {h:"Brand Language & Visual Identity",p:"Lemonade's primary pink (#FF0083) conveys warmth, energy, and disruption — it immediately signals that this is not a traditional insurance company. Clean whites and soft grays create trust and readability. Rounded corners and generous spacing feel approachable and reduce the anxiety often associated with insurance. Our illustrations use a playful, flat style that makes insurance feel human and accessible. The brand voice is warm, direct, and occasionally witty — we avoid jargon and corporate speak. Policy 2.0, our plain-English open-source insurance policy, is the ultimate expression of our brand principle that transparency builds trust."},
      {h:"Mobile & App Design",p:"The Lemonade consumer app is built with React Native and serves as the flagship customer experience. Key flows include onboarding with AI Maya (signing up customers in under a minute), claim filing with AI Jim (3 steps including video recording), policy management, and the Giveback selection during signup. The app design prioritizes conversational UI patterns — the AI interactions should feel like talking to a helpful friend, not filling out forms. Progressive disclosure keeps each screen simple while making more detail available when needed. Every design decision is tested against the question: would this make sense to someone who has never bought insurance before?"},
      {h:"Design Process & Workflow",p:"The design process follows a structured flow: Discovery → Wireframes → Visual design → Prototype → User testing → Dev handoff → QA review. We use Figma for all design work, including wireframes, high-fidelity mockups, prototypes, and design system maintenance. Each squad designer owns their product area end-to-end and participates in weekly design crits where designers across all squads share work-in-progress, give feedback, and maintain consistency. Design handoff to engineering includes annotated Figma files with clear specifications for spacing, typography, colors (using design tokens, not hardcoded values), interaction states, and responsive behavior. Designers are expected to review the implementation during QA."},
      {h:"Accessibility Standards",p:"WCAG AA compliance is mandatory across all customer-facing surfaces and strongly encouraged for internal tools. Color contrast ratios must meet minimum standards for all text and interactive elements. Keyboard navigation must work for every user flow — users should be able to complete any action without a mouse. Screen reader support requires proper semantic HTML, ARIA labels, and focus management. Use our a11y checklist in Figma before every design handoff. Accessibility is not a separate phase — it is built into the design from the beginning. With nearly 3 million customers, even a small percentage of users with accessibility needs represents a significant number of real people who depend on our products."},
      {h:"Internal Tools Design",p:"Beyond customer-facing products, designers at Lemonade also shape internal tools used by claims specialists (Blender), CX agents, and operations teams. Internal tools prioritize efficiency and information density over delight — these users process hundreds of cases daily and need fast access to data. Key patterns include data tables with filtering and sorting, bulk actions, keyboard shortcuts, and contextual detail panels. About 200 internal users rely on these tools daily. Design decisions for internal tools directly impact our loss adjustment expense ratio (currently 6%, well below the industry average of 9%) by enabling faster and more accurate claims processing."},
      {h:"Design for New Joiners",p:"In your first week, get access to Figma and explore the Design System v3 library, which contains 200+ components organized by atomic design principles. Read through the pattern library to understand existing solutions before designing new ones. Shadow the weekly design crit to understand the team's feedback culture. In week two, start contributing to your squad's design work — even small improvements to existing flows are valuable. Your fresh perspective as a new joiner is an asset: the Fresh Eyes Audit in week three is an opportunity to identify usability issues that experienced team members may overlook. Document your AI usage in design work through the AI Contribution Log, noting which concepts were AI-assisted and how you applied your own craft judgment."}
    ]},
  {id:"r12",ct:"Design",ti:"Figma Design System v3",ds:"Component library, tokens, and design patterns",tm:"25 min",rl:"Designer",au:"Design Systems",dt:"Feb 2026",
    body:[
      {h:"Component Library",p:"The design system contains 200+ components organized by atomic design principles: atoms (buttons, inputs, icons, badges), molecules (cards, list items, form groups), organisms (forms, navigation bars, modals, data tables), and templates (page layouts for different product areas). Every component has variants for state (default, hover, active, disabled, error), size (small, medium, large), and theme (light and dark mode). Components are built to be composable — combine atoms into molecules and molecules into organisms to build any interface consistently. Before creating a new component, always check if an existing one can be adapted."},
      {h:"Design Tokens",p:"Colors, typography, spacing, shadows, and border radii are defined as design tokens — not hardcoded values. Use tokens exclusively in all designs to ensure consistency and maintainability. Tokens sync to code via Style Dictionary, ensuring what you design in Figma matches exactly what engineers build in React and React Native. The primary pink (#FF0083) and its variants, neutral grays, success/warning/error colors, and the full typography scale are all tokenized. When you need a color or spacing value, reference the token — never eyedrop or type a hex code manually. This discipline pays off enormously when the brand evolves or when we need to support features like dark mode across all products."},
      {h:"Patterns & Templates",p:"Common patterns cover the key user journeys across all Lemonade products: onboarding flow (AI Maya conversation), claim filing (video upload and AI Jim interaction), policy management (dashboard, details, modifications), settings, empty states, loading states, and error states. Check the pattern library before designing any new flow — reuse is preferred over reinvention. If an existing pattern does not fit your use case, discuss it in the weekly design crit before creating something new. Templates provide starting points for full pages, including responsive layouts for mobile (70% of traffic), tablet, and desktop. Each template includes proper spacing, content hierarchy, and component placement guidelines."},
      {h:"Contributing to the Design System",p:"The design system is maintained collaboratively by all designers, with a dedicated design systems team coordinating updates and releases. To propose a new component or modification, create a proposal in the design system Figma file with clear rationale, use cases, and variant specifications. Proposals are reviewed in the bi-weekly design system sync. When a new component is approved, the design systems team works with engineering to ensure the coded implementation matches the Figma specification. Version control for the design system uses Figma branching — make changes in a branch and submit for review, just like a code PR."},
      {h:"Getting Started with the Design System",p:"In your first week, spend time browsing all pages of the Design System v3 Figma file. Enable the design system library in your Figma workspace so all components are available when you create new files. Practice building a simple page using only design system components and tokens — this exercise helps you internalize what is available and how components compose together. Ask your squad's designer or the design systems team if you cannot find a component for your use case. The goal is for every Lemonade interface to feel like it belongs to the same family, whether it is a customer-facing insurance app or an internal claims management tool."}
    ]},
  {id:"r13",ct:"Design",ti:"Product Platform Intro",ds:"Tour of all Lemonade products from a design perspective",tm:"25 min",rl:"Designer",au:"Product Design",dt:"Jan 2026",
    body:[
      {h:"Product Tour Overview",p:"As a designer at Lemonade, you will work across our consumer app (React Native), web app (React and TypeScript via Uniclient), and internal tools. Each platform shares the same design system (Figma Design System v3) but has platform-specific patterns suited to its users and context. Understanding the full product landscape helps you design with consistency and make informed decisions about when to follow existing patterns versus when a new approach is needed. With nearly 3 million customers and $738 million in revenue during 2025, the design decisions you make touch a significant number of people."},
      {h:"Consumer App — Mobile",p:"The flagship mobile experience is built with React Native and serves as the primary touchpoint for most customers. AI Maya guides users through quoting, purchasing, and claims in a conversational interface that signs up customers in under a minute. Key flows include onboarding (5 screens with progressive disclosure), claim filing (3 steps including video recording for AI Jim analysis), and policy management (dashboard, coverage details, modifications). The app also handles the Giveback selection during signup, where customers choose which nonprofit receives their unused premiums. Focus on conversational UI patterns, minimal friction, and clear visual hierarchy. Remember that 70% of our traffic is mobile — this is where most customers experience Lemonade."},
      {h:"Consumer App — Web",p:"The web experience is built on our Uniclient platform using React and TypeScript. It covers quoting, purchasing, account management, and claims for customers who prefer a desktop experience. The web app shares the same design system as mobile but adapts layouts for larger screens with multi-column layouts, expanded navigation, and richer data visualization where appropriate. The web experience is particularly important for homeowners insurance — a higher-consideration product where customers may want to review more details before purchasing. Ensure responsive designs work across desktop, tablet, and mobile breakpoints."},
      {h:"Internal Tools — Blender & Operations",p:"Internal tools are used by claims specialists, CX agents, and operations teams — about 200 internal users daily. Blender is the primary claims management interface where specialists see AI Jim's assignments, coverage determinations, risk alerts, and supplier dispatch. The CX dashboard provides customer interaction history and context for support agents. Prioritize efficiency and information density over visual delight in internal tools — these users process hundreds of cases daily and need fast access to data. Key patterns include data tables with advanced filtering and sorting, bulk actions, keyboard shortcuts for power users, and contextual detail panels that show full context without navigating away. Design decisions for internal tools directly impact operational efficiency and our industry-leading 6% loss adjustment expense ratio."},
      {h:"Product Lines & Design Considerations",p:"Each product line has unique design considerations. Renters insurance (from $5/mo) targets young, mobile-first users who expect speed and simplicity. Homeowners insurance (4.9-star rating) involves more complex coverage options and higher stakes decisions. Pet insurance (over 50% of claims handled instantly by AI Jim) needs empathetic design for emotionally charged moments when pets are sick or injured. Car insurance — including the new Tesla FSD autonomous car insurance launched January 2026 — involves telematics data visualization and driving behavior feedback. Term life insurance requires sensitive handling of mortality-related topics while maintaining the brand's approachable tone."},
      {h:"Getting Started as a Product Designer",p:"In your first week, download and explore the consumer app as a real user — go through the quote flow for at least two product lines to understand the customer experience firsthand. Review the internal tools with your squad to understand the operational workflows. In week two, start contributing design work to your squad — even small improvements to existing flows are valuable. The Fresh Eyes Audit in week three is your opportunity to identify design improvements from a fresh perspective. Document all design work in the AI Contribution Log, noting which concepts were AI-assisted and which represent your own craft judgment."}
    ]},
  // ── PM ──
  {id:"r14",ct:"PM",ti:"Product Strategy",ds:"How we define and prioritize the product roadmap",tm:"25 min",rl:"PM",au:"CPO Office",dt:"Jan 2026",
    body:[
      {h:"Strategy Framework",p:"Our product strategy follows a clear cascade: Mission → 3-Year Vision → Annual Themes → Quarterly OKRs → Squad Goals → Sprint Work. Every feature should trace back to a quarterly OKR, which in turn connects to an annual theme and ultimately to the company mission of turning insurance into a social good. This framework ensures alignment across about 1,300 employees and prevents teams from optimizing locally at the expense of company-wide goals. Founded in 2015 by Daniel Schreiber and Shai Wininger, Lemonade's mission has remained constant even as the product portfolio has expanded from renters insurance to homeowners, pet, car, and life insurance."},
      {h:"Prioritization & Decision Making",p:"We use RICE scoring (Reach x Impact x Confidence / Effort) for backlog prioritization, but RICE is a starting point, not the final answer. Context matters: regulatory requirements, competitive threats, and strategic bets may override RICE scores. Quarterly planning involves all PMs presenting their proposed OKRs and the supporting initiatives. Final prioritization decisions are made by the product leadership team with input from engineering and design leads. With $738 million in revenue during 2025 (up 40% YoY) and nearly 3 million customers, prioritization decisions have real financial impact — every feature competes for limited engineering capacity."},
      {h:"Roadmap Management",p:"The living roadmap is maintained in Fibery and synced to Monday.com for sprint execution, updated weekly. It uses three horizons: Now (this quarter, committed work that squads are delivering), Next (next quarter, planned work with high confidence), and Later (6+ months, exploratory ideas being validated). Roadmap updates are shared in #product-all monthly to keep the entire company informed. PMs are responsible for maintaining their squad's section of the roadmap and ensuring it accurately reflects current priorities. When priorities shift — and they will — update the roadmap immediately rather than waiting for the next monthly update."},
      {h:"Product Metrics & Success",p:"Every product initiative must have clear success metrics defined before development begins. The key business metrics we track include in-force premiums ($1.24 billion at end of 2025, up 31% YoY), revenue ($738 million in 2025, up 40% YoY), customer count (nearly 3 million), gross loss ratio (trailing 12-month record low of 64% at end of 2025), and claims automation rate (roughly 55% end-to-end automated). Product metrics include conversion rates, activation, engagement, retention, and NPS. Every PM should know their squad's key metrics and check them at least weekly. Use Mixpanel for product analytics, Looker for business metrics, and Datadog for engineering health."},
      {h:"Strategic Bets",p:"Beyond incremental product improvements, Lemonade makes strategic bets on new markets and capabilities. Recent examples include the Tesla FSD autonomous car insurance launched in January 2026 (starting in Arizona and Oregon, offering up to 50% lower rates for FSD miles), Synthetic Agents for AI-driven automation, and international expansion across the UK and Europe. As a PM, you should understand these strategic bets and how your squad's work supports or enables them. Read the company blog posts on Synthetic Agents and autonomous car insurance to understand the strategic vision."}
    ]},
  {id:"r15",ct:"PM",ti:"Product Skills",ds:"Core PM competencies at Lemonade — data, stakeholders, specs",tm:"20 min",rl:"PM",au:"PM Lead",dt:"Feb 2026",
    body:[
      {h:"Data-Informed Decisions",p:"Every PM at Lemonade must be data-literate. You will use Mixpanel for product analytics (funnels, cohorts, event tracking), Looker for business metrics (revenue, policies, claims, loss ratio), and custom dashboards for squad-specific KPIs. Write SQL to query data directly when dashboards do not answer your question. Read graphs critically and question assumptions — correlation is not causation, and small sample sizes can mislead. With nearly 3 million customers and $738 million in revenue, even small conversion improvements translate into significant business impact. Know your key metrics cold: what they are, where to find them, what the baseline is, and what improvement looks like."},
      {h:"Stakeholder Management",p:"You will work with engineering, design, actuarial, legal, CX, and marketing teams. Run weekly stakeholder syncs to keep everyone aligned on priorities and progress. Document decisions in Confluence with clear rationale so future team members can understand why choices were made. Use RACI (Responsible, Accountable, Consulted, Informed) for major initiatives to clarify who does what. Insurance is a regulated industry, so legal and actuarial stakeholders have veto power on compliance-related decisions — build strong relationships with these teams early. At Lemonade, PMs are expected to be the connective tissue between all functions, not just a requirements writer."},
      {h:"Writing Specs",p:"We use a standard spec template: Problem → Hypothesis → Solution → Success Metrics → Edge Cases → Dependencies. Specs live in Confluence and are reviewed by engineering and design before sprint planning. A good spec is concise but thorough — it should answer every question an engineer or designer would have without being so long that nobody reads it. Include wireframes or mockups from your designer, API contracts if relevant, and rollout strategy (feature flags, A/B tests, canary deploys). The AI Contribution Log applies to specs too — document which parts of the spec were AI-assisted and what judgment you applied."},
      {h:"AI-Native Product Thinking",p:"At Lemonade, AI is not a feature — it is the foundation. PMs must understand how AI Maya, AI Jim, CX.AI, Cooper, and Forensic Graph work at a conceptual level, even if they do not need to understand the technical implementation. When designing features, always ask: can this be automated? Can AI handle this interaction? What is the human escalation path? Roughly 55% of claims are fully automated end-to-end, and 96% of first notices of loss are handled by AI Jim. CX.AI handles approximately 30% of customer inquiries. Your job as a PM is to identify opportunities to extend this automation while maintaining quality and customer trust."},
      {h:"Insurance Domain Knowledge",p:"PMs at Lemonade need working knowledge of insurance concepts: premiums, deductibles, coverage limits, exclusions, loss ratios, combined ratios, reinsurance, and regulatory filing requirements. You do not need to be an actuary, but you need to speak the language and understand the constraints. The trailing-12-month gross loss ratio reached a record low of 64% at end of 2025, well below the 75% sweet-spot target — understanding why this matters and how product decisions affect it is essential. Read the Risk Overview and Claims 101 articles for foundational knowledge, and schedule time with the actuarial team in your first two weeks."}
    ]},
  {id:"r16",ct:"PM",ti:"From OKRs to Weekly Planning",ds:"How company OKRs flow into squad goals and sprint work",tm:"18 min",rl:"PM",au:"Product Ops",dt:"Jan 2026",
    body:[
      {h:"The Cascade",p:"Company OKRs (set by leadership) → Department OKRs → Squad OKRs → Sprint goals → Individual tasks. Each level maps up clearly and should be traceable. If you cannot trace a task to an OKR, question whether it should be done — and if the answer is still yes, make the OKR connection explicit. This cascade ensures that about 1,300 Lemonade Makers are rowing in the same direction. Company OKRs are typically set around key business metrics: in-force premiums growth, revenue targets, loss ratio improvement, customer satisfaction, and claims automation rates. Your squad OKRs should be concrete contributions to these company goals."},
      {h:"Weekly Planning Rhythm",p:"Monday: sprint planning and priority check — review what was accomplished last week, what is committed for this week, and whether priorities have shifted. Wednesday: mid-week status — surface blockers, check progress against sprint goals, and coordinate with dependencies. Friday: week-in-review and metrics check — review squad KPIs, celebrate wins, and identify areas for improvement. Use Fibery for roadmap and planning context, Monday.com for sprint task management, Slack for async updates, and Confluence for documenting decisions. This rhythm keeps the team focused and surfaces problems early when they are cheapest to fix."},
      {h:"Quarterly Planning Process",p:"Quarterly planning is the most important planning cadence at Lemonade. It happens in the last two weeks of each quarter for the upcoming quarter. PMs present proposed OKRs with supporting evidence (data, customer feedback, strategic alignment) to the product leadership team. Engineering leads provide capacity estimates. Design leads flag dependencies and resource constraints. The output is a committed set of squad OKRs for the quarter, documented in Fibery with clear owners and key results, then broken into sprint items in Monday.com. Quarterly plans are shared company-wide to maintain transparency and alignment."},
      {h:"Handling Priority Changes",p:"Priorities change — new competitive threats, regulatory requirements, or customer issues can emerge mid-quarter. When this happens, the PM is responsible for assessing impact, proposing trade-offs (what gets deprioritized), and communicating changes to all stakeholders. Update the roadmap in Fibery immediately and adjust sprint items in Monday.com. Notify affected squads via Slack. Document the rationale in Confluence. The goal is not to prevent priority changes but to manage them transparently so the team maintains trust in the planning process."}
    ]},
  {id:"r17",ct:"PM",ti:"How We Do OKRs",ds:"The Lemonade OKR framework — setting, tracking, reviewing",tm:"18 min",rl:"PM",au:"Strategy Team",dt:"Jan 2026",
    body:[
      {h:"Setting OKRs",p:"Objectives are ambitious and inspiring — they describe where we want to go, not how to get there. Key Results are measurable and time-bound — they describe how we know we got there. Each squad sets 2-3 OKRs per quarter, keeping the focus narrow enough to make real progress. OKRs are graded 0.0-1.0, with 0.7 being 'on target' because we aim high. A score of 1.0 means the objective was too easy. A score below 0.4 means something went wrong that needs investigation. Good OKRs are connected to business outcomes — for example, improving the quote-to-bind conversion rate by 5%, reducing claims processing time by 20%, or expanding car insurance to two new states."},
      {h:"OKR Examples at Lemonade",p:"Here are examples of well-formed OKRs at different levels. Company-level: Objective — Become the most trusted AI-first insurer. KR1 — Reach $1.5B in-force premiums. KR2 — Achieve 60% claims automation rate. KR3 — Maintain gross loss ratio below 70%. Squad-level: Objective — Make pet claims feel instant. KR1 — Increase instant pet claim approval rate from 50% to 65%. KR2 — Reduce average pet claim resolution time by 30%. KR3 — Maintain pet claims NPS above 80. Individual OKRs are less common at Lemonade — the focus is on squad outcomes, not individual performance measurement."},
      {h:"Tracking & Review",p:"Weekly check-ins happen in Fibery where each KR is updated with current progress, while sprint-level tasks are tracked in Monday.com. Monthly all-hands updates share company-wide OKR progress to maintain transparency. Quarterly grading and retrospective close out each cycle — teams grade their OKRs, discuss what worked and what did not, and use those insights to set better OKRs for the next quarter. OKR scores do not affect compensation — they are a tool for alignment and ambition, not a performance management weapon. This is critical: if OKRs affected pay, teams would sandbag their targets, which defeats the purpose of setting ambitious goals."},
      {h:"Common OKR Pitfalls",p:"Avoid these common mistakes: setting too many OKRs (stick to 2-3 per squad), confusing activities with outcomes (ship feature X is an activity; increase conversion by Y% is an outcome), setting KRs you cannot measure, and treating OKRs as a to-do list rather than a strategic alignment tool. At Lemonade, the best OKRs are ones where the squad has to figure out the 'how' during the quarter — if you already know exactly what to do, the OKR is probably too tactical. OKRs should create focus and force trade-offs, not describe everything the team does."}
    ]},
  {id:"r18",ct:"PM",ti:"Monday Intro",ds:"Monday.com workspaces, boards, automations, and sprint management",tm:"20 min",rl:"PM",au:"PM Ops",dt:"Feb 2026",
    body:[
      {h:"Workspace Structure",p:"The top-level Product workspace in Monday.com contains boards for each squad. Each board has groups: Backlog, Sprint, In Progress, Review, and Done. Items have standardized fields including owner, priority (P0-P3), status, OKR link, estimated effort (in story points), and actual effort (filled after completion). This consistent structure across squads enables cross-team visibility and makes quarterly planning and capacity forecasting possible. Every squad board also includes a 'Tech Debt' group for tracking non-feature engineering work, ensuring it gets scheduled alongside product work."},
      {h:"Automations & Integrations",p:"Monday.com automations reduce manual overhead and keep everyone informed. Status changes trigger Slack notifications to the relevant squad channel. Due date approaching sends reminders 2 days before and on the day. When all sub-items of an epic are done, the parent item auto-completes. Sprint velocity is calculated automatically from completed story points per sprint. Monday integrates with Jira for engineering ticket tracking, with Fibery for product roadmap and planning visibility, with Slack for notifications and updates, and with Confluence for linking to specs and documentation. These automations ensure that the board always reflects reality without requiring PMs to spend time on manual updates."},
      {h:"Sprint Management",p:"Use the Sprint View to plan 2-week sprints. Drag items from Backlog to Sprint during sprint planning on Monday morning. Monday calculates sprint capacity based on team size and historical velocity, giving you a data-informed estimate of what the team can realistically accomplish. Review the sprint burndown chart daily to spot early signs of scope creep or blockers. At the end of each sprint, items still in progress roll over automatically but should be discussed in the retrospective. Completed items are archived but remain accessible for historical analysis. Sprint-over-sprint velocity trends are the best leading indicator of team health."},
      {h:"Dashboards & Reporting",p:"Monday.com provides built-in dashboards that aggregate data across squads and time periods. The Product Overview dashboard shows all active sprints, their progress, and any blocked items across all squads. The OKR Progress dashboard connects sprint work to quarterly objectives and shows whether teams are on track. The Velocity Trends dashboard shows sprint-over-sprint velocity for each squad. PMs should check these dashboards weekly and use them in stakeholder communications. Custom dashboards can be built for specific needs — for example, tracking all items related to a cross-team initiative like the Tesla FSD car insurance launch."},
      {h:"Getting Started for New PMs",p:"In your first week, get access to Monday.com through your SSO credentials and familiarize yourself with your squad's board. Review the last 2-3 sprints to understand the team's velocity, the types of work being done, and the typical item structure. Attend sprint planning to see how the PM facilitates prioritization and capacity allocation. By week two, you should be comfortable creating items, linking them to OKRs, and using the Sprint View to manage your squad's work. Ask the PM Ops team if you need help with automations or custom views."}
    ]},
  {id:"r18b",ct:"PM",ti:"Fibery Intro",ds:"Product roadmaps, PRDs, and planning in Fibery",tm:"18 min",rl:"PM",au:"PM Ops",dt:"Mar 2026",
    body:[
      {h:"Why Fibery",p:"Lemonade uses Fibery for product planning and execution, replacing what was previously spread across Google Sheets, Airtable, and other tools. Fibery serves as the single source of truth for product roadmaps, PRDs, feature specifications, and strategic planning. While Monday.com handles sprint-level task management and execution, Fibery is where product thinking happens — from high-level strategy through quarterly planning to individual feature specs. The tech department evaluated over 40 tools before selecting Fibery to unify their planning workflows into a single connected workspace."},
      {h:"Workspace Structure",p:"The Fibery workspace is organized around key product entities: Products, Features, PRDs, OKRs, and Initiatives. Each entity type has standardized fields and views that the PM Ops team maintains. The Product Roadmap view shows all features across three horizons: Now (this quarter, committed work), Next (next quarter, planned), and Later (6+ months, exploratory). The PRD template includes Problem, Hypothesis, Solution, Success Metrics, and Dependencies sections. OKRs in Fibery link directly to Features and PRDs, making it easy to trace any piece of work back to a strategic objective. Each squad has its own filtered view showing only their relevant items."},
      {h:"Key Workflows",p:"PRD Creation: Start from the PRD template in Fibery, fill in the standard sections, link to the parent OKR, and share with your squad for review. Roadmap Updates: Update feature status and timeline directly in the Roadmap view — changes are visible to all stakeholders immediately. Quarterly Planning: Create proposed OKRs in Fibery with supporting evidence, then link to the initiatives that will deliver each key result. Once quarterly plans are approved, break initiatives into sprint items and sync them to Monday.com for execution. Cross-squad coordination happens through shared Fibery views that show dependencies between squads."},
      {h:"Fibery and Monday Integration",p:"Fibery and Monday.com work together in a clear hierarchy. Fibery holds the strategic and planning layer: roadmaps, OKRs, PRDs, and feature specs. Monday.com holds the execution layer: sprint boards, task tracking, and daily workflow. Features in Fibery link to epic-level items in Monday.com, creating a bidirectional connection between planning and execution. Status updates in Monday.com roll up to Fibery, giving product leadership a high-level view of progress without needing to check individual sprint boards. This separation keeps strategic context clean while giving squads the sprint-level detail they need for daily execution."},
      {h:"Getting Started for New PMs",p:"In your first week, get access to Fibery through your SSO credentials at lemonade.fibery.io and explore your squad's roadmap and active PRDs. Read through two to three recent PRDs to understand the template and level of detail expected. In week two, try creating a draft PRD for a small feature or improvement you identified during your Fresh Eyes exploration. Share it with your squad lead for feedback. By week three, you should be comfortable navigating the roadmap, creating and updating PRDs, and linking your work to OKRs. Ask the PM Ops team if you need help with custom views or workspace navigation."}
    ]},
