      <div className="flex items-center gap-1 sm:gap-2 lg:gap-3 min-w-0">
        {/* BACK BUTTON */}
        {scrHist.length>0&&<button onClick={goBack} className="w-8 h-8 rounded-lg bg-white border border-[#E5E7EB] flex items-center justify-center hover:border-[#FF0083] transition-colors shadow-sm" title="Go back" aria-label="Go back"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#6B7280" strokeWidth="2" strokeLinecap="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></button>}
        {/* SEARCH */}
        <div className="relative tour-search hidden sm:block ls-hide">
          <input value={searchQ} onChange={e=>{setSearchQ(e.target.value);setSearchOpen(true)}} onFocus={()=>setSearchOpen(true)} onBlur={()=>setTimeout(()=>setSearchOpen(false),200)}
            className="w-36 lg:w-48 bg-white border border-[#E5E7EB] rounded-lg px-3 py-1.5 text-[13px] text-[#1A1A2E] placeholder-[#9CA3AF] focus:outline-none focus:border-[#FF0083] focus:w-64 transition-all shadow-sm" placeholder="Search... ⌘K"/>
          {searchOpen&&searchResults.length>0&&<div className="absolute top-full right-0 mt-1 w-80 bg-white border border-[#E5E7EB] rounded-[14px] shadow-lg overflow-hidden z-50">
            {searchResults.map((r,i)=><button key={i} onMouseDown={()=>{r.act();setSearchQ("");setSearchOpen(false)}} className="w-full px-4 py-2.5 flex items-center gap-3 hover:bg-[#F7F7F7] text-left transition-colors">
              <span className="text-[10px] px-2 py-0.5 rounded bg-[#F3F4F6] text-[#9CA3AF] font-medium">{r.ty}</span>
              <div className="flex-1 min-w-0"><p className="text-[13px] text-[#1A1A2E] font-medium truncate">{r.nm}</p><p className="text-[11px] text-[#9CA3AF] truncate">{r.sub}</p></div>
            </button>)}
          </div>}
        </div>
        {/* DARK MODE TOGGLE — hidden on small mobile */}
        <button onClick={()=>setDarkMode(!darkMode)} aria-label="Toggle dark mode" className="hidden sm:flex ls-hide w-8 h-8 rounded-lg items-center justify-center hover:border-[#FF0083] transition-colors shadow-sm" style={{background:darkMode?'#334155':'white',border:darkMode?'1px solid #475569':'1px solid #E5E7EB'}}>
          {darkMode?<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          :<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#6B7280" strokeWidth="2" strokeLinecap="round"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>}
        </button>
        {/* TOUR BUTTON */}
        <button onClick={()=>{setTourStep(0);setTourDone(false)}} aria-label="Take a tour" title="Take a tour" className="hidden sm:flex ls-hide items-center gap-1.5 h-8 rounded-lg bg-white border border-[#E5E7EB] px-2.5 hover:border-[#FF0083] transition-colors shadow-sm text-[12px] font-medium text-[#9CA3AF] hover:text-[#FF0083]"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>Tour</button>
        {/* SHORTCUTS BUTTON */}
        <button onClick={()=>setShortcutsOpen(true)} aria-label="Keyboard shortcuts" title="Keyboard shortcuts (?)" className="hidden sm:flex ls-hide w-8 h-8 rounded-lg bg-white border border-[#E5E7EB] items-center justify-center hover:border-[#FF0083] transition-colors shadow-sm text-[13px] font-mono text-[#9CA3AF] hover:text-[#FF0083]">?</button>
        {role==="maker"&&<div className="hidden sm:flex items-center gap-2 bg-[#FF008310] rounded-full pl-1.5 pr-3 py-1"><ProgressRing pct={Math.round(maker.day/30*100)} sz={28}/><span className="text-[12px] text-[#FF0083] font-bold">Day {maker.day}/30</span></div>}
        {role==="lead"&&<button onClick={()=>setScr("team")} className="hidden sm:flex items-center gap-2 bg-[#FF008310] rounded-full px-3 py-1 hover:bg-[#FF008325] transition-colors cursor-pointer"><span className="text-[12px] text-[#FF0083] font-bold">{leadE.length} reports</span></button>}
        {/* NOTIFICATIONS */}
        <div className="relative tour-notif">
          <button onClick={()=>setNotifOpen(!notifOpen)} aria-label="Notifications" aria-expanded={notifOpen} className="relative w-8 h-8 rounded-lg bg-white border border-[#E5E7EB] flex items-center justify-center hover:border-[#FF0083] transition-colors shadow-sm" style={{zIndex:55,position:'relative'}}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={darkMode?"#94A3B8":"#6B7280"} strokeWidth="2" strokeLinecap="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
            {unread>0&&<div className="absolute -top-1 -right-1 w-4 h-4 rounded-full bg-[#ef4444] text-white text-[9px] font-bold flex items-center justify-center">{unread}</div>}
          </button>
          {notifOpen&&<div style={{position:'fixed',inset:0,zIndex:50}} onClick={()=>{setNotifs(p=>p.map(n=>({...n,read:true})));setNotifOpen(false)}}/>}
          {notifOpen&&<div onClick={e=>e.stopPropagation()} style={{position:'fixed',top:56,right:8,width:'min(320px, calc(100vw - 16px))',zIndex:51,background:darkMode?'#1e293b':'#fff',border:darkMode?'1px solid #475569':'1px solid #E5E7EB',borderRadius:14,boxShadow:darkMode?'0 10px 40px rgba(0,0,0,.5)':'0 10px 40px rgba(0,0,0,.12)',overflow:'hidden'}}>
            <div style={{padding:'12px 16px',borderBottom:darkMode?'1px solid #475569':'1px solid #E5E7EB',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <span style={{fontSize:13,fontWeight:600,color:darkMode?'#F1F5F9':'#1A1A2E'}}>Notifications<span style={{fontSize:10,fontWeight:400,color:darkMode?'#64748B':'#9CA3AF',marginLeft:6}}>{role==="maker"?maker.rl:role==="lead"?"Lead":"Strategy"}</span></span>
              <button onClick={()=>{setNotifs(p=>p.map(n=>({...n,read:true})));showToast({msg:"All marked as read",type:"success"})}} style={{fontSize:11,color:'#FF0083',fontWeight:500,background:'none',border:'none',cursor:'pointer'}}>Mark all read</button>
            </div>
            <div style={{maxHeight:320,overflowY:'auto'}}>{notifs.length===0?<div style={{padding:'24px 16px',textAlign:'center',color:darkMode?'#64748B':'#9CA3AF',fontSize:13}}>No notifications</div>:notifs.map(n=><div key={n.id} onClick={()=>{setNotifs(p=>p.map(x=>x.id===n.id?{...x,read:true}:x));if(n.emp){setSelId(n.emp)};if(n.scr){setScr(n.scr)};setNotifOpen(false)}} style={{padding:'12px 16px',display:'flex',alignItems:'flex-start',gap:10,cursor:'pointer',borderBottom:darkMode?'1px solid #475569':'1px solid #E5E7EB',background:!n.read?(darkMode?'rgba(255,0,131,.08)':'rgba(255,0,131,.03)'):'transparent',transition:'background .15s'}} onMouseEnter={e=>e.currentTarget.style.background=darkMode?'rgba(255,0,131,.18)':'rgba(255,0,131,.08)'} onMouseLeave={e=>e.currentTarget.style.background=!n.read?(darkMode?'rgba(255,0,131,.08)':'rgba(255,0,131,.03)'):'transparent'}>
              <span style={{marginTop:2,flexShrink:0}}><CI n={n.ic} sz={16}/></span>
              <div style={{flex:1,minWidth:0}}><p style={{fontSize:13,color:n.read?(darkMode?'#94A3B8':'#6B7280'):(darkMode?'#F1F5F9':'#1A1A2E'),fontWeight:n.read?400:500,margin:0}}>{n.tx}</p><p style={{fontSize:11,color:darkMode?'#64748B':'#9CA3AF',marginTop:3,margin:0}}>{n.ts}</p></div>
              {!n.read&&<div style={{width:8,height:8,borderRadius:'50%',background:'#FF0083',marginTop:6,flexShrink:0}}/>}
              <span style={{fontSize:10,color:'#FF0083',fontWeight:600,flexShrink:0,marginTop:3}}>View →</span>
            </div>)}</div>
            <div style={{padding:'10px 16px',borderTop:darkMode?'1px solid #475569':'1px solid #E5E7EB',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <button onClick={()=>{setNotifs([]);setNotifOpen(false)}} style={{fontSize:11,color:darkMode?'#94A3B8':'#9CA3AF',fontWeight:500,background:'none',border:'none',cursor:'pointer'}}>Clear all</button>
              <button onClick={()=>{setNotifs(p=>p.map(n=>({...n,read:true})));setNotifOpen(false)}} style={{fontSize:11,color:'#FF0083',fontWeight:500,background:'none',border:'none',cursor:'pointer'}}>Close</button>
            </div>
          </div>}
        </div>
        <div className="h-5 w-px bg-[#E5E7EB] hidden sm:block ls-hide"/>
        <div className="tour-role flex items-center bg-[#F3F4F6] rounded-lg p-0.5 gap-0.5 flex-shrink-0">
          {[["maker","Maker","lemon"],["lead","Lead","people"],["strategy","Strategy","chart"]].map(([r,lb])=>
            <button key={r} onClick={()=>chRoleTab(r)} className={`px-1.5 sm:px-3.5 py-1 sm:py-1.5 rounded-md text-[10px] sm:text-[13px] font-medium transition-all whitespace-nowrap ${role===r?"bg-white shadow-sm text-[#1A1A2E]":"text-[#9CA3AF] hover:text-[#6B7280]"}`} style={role===r?{borderBottom:"2px solid #FF0083"}:{}}>{lb}</button>
          )}</div>
      </div>
    </div>
    <div className="flex-row-shell flex flex-1 overflow-hidden min-h-0">
      {/* SIDEBAR OVERLAY (mobile) */}
      {sidebarOpen&&<div className="sidebar-overlay lg:hidden" onClick={()=>setSidebarOpen(false)}/>}
      {/* SIDEBAR */}
      <div className={`tour-sidebar w-[220px] bg-[#F7F7F7] flex-shrink-0 flex flex-col overflow-y-auto border-r border-[#E5E7EB] fixed lg:static inset-y-0 left-0 z-[46] sidebar-drawer ${sidebarOpen?"translate-x-0":"-translate-x-full lg:translate-x-0"}`} style={{top:"56px"}}>
        <div className="px-5 pt-6 mb-3"><p className="text-[9px] font-semibold uppercase tracking-[.2em] text-[#D1D5DB]">{role==="maker"?"Maker View":role==="lead"?"Lead View":"Strategy View"}</p></div>
        {role==="maker"&&<div className="px-3 mb-3"><select value={makerSel} onChange={e=>{setMakerSel(e.target.value);setScr("home")}} className="w-full bg-white border border-[#E5E7EB] rounded-xl px-3 py-2 text-[13px] text-[#1A1A2E] focus:outline-none focus:border-[#FF0083] shadow-sm">
          <optgroup label="Engineers">{es.filter(e=>e.rl==="Engineer").map(e=><option key={e.id} value={e.id}>{e.nm} · Day {e.day}</option>)}</optgroup>
          <optgroup label="Designers">{es.filter(e=>e.rl==="Designer").map(e=><option key={e.id} value={e.id}>{e.nm} · Day {e.day}</option>)}</optgroup>
          <optgroup label="PMs">{es.filter(e=>e.rl==="PM").map(e=><option key={e.id} value={e.id}>{e.nm} · Day {e.day}</option>)}</optgroup>
        </select></div>}
        {role==="lead"&&<div className="px-3 mb-3"><select value={leadSel} onChange={e=>setLeadSel(e.target.value)} className="w-full bg-white border border-[#E5E7EB] rounded-xl px-3 py-2 text-[13px] text-[#1A1A2E] focus:outline-none focus:border-[#FF0083] shadow-sm">
          {Object.keys(LEADS).map(k=><option key={k} value={k}>{LEADS[k].nm} — {LEADS[k].rl}</option>)}
        </select></div>}
        <nav role="navigation" aria-label="Main navigation" className="space-y-0.5 px-2 flex-1">{nav.filter(it=>!it.minDay||(role==="maker"&&maker.day>=it.minDay)).map((it,idx)=>{
          if(it.section!==undefined)return it.section?<p key={"s"+idx} className="text-[9px] font-semibold uppercase tracking-[.2em] text-[#D1D5DB] px-3 pt-4 pb-1">{it.section}</p>:<div key={"s"+idx} className="h-px bg-[#E5E7EB] mx-3 my-2"/>;
          const act=scr===it.id;return(
          <button key={it.id} onClick={()=>{setScr(it.id);if(it.id==="team")setSelId(null);setSidebarOpen(false)}}
            className={`nav-i w-full flex items-center gap-3 px-3 py-2.5 text-[14px] text-left rounded-lg ${act?"nav-a":"text-[#6B7280]"}`}>
            <span className="flex-shrink-0"><NI n={it.ic} active={act}/></span><span className="font-medium">{it.lb}</span>
          </button>
        )})}</nav>
        {/* USER PROFILE */}
        <div className="p-4 border-t border-[#E5E7EB] mt-2">
          <div className="flex items-center gap-3"><Av e={viewUser} sz={36}/><div><p className="text-[13px] font-semibold text-[#1A1A2E]">{viewUser.nm}</p><p className="text-[11px] text-[#9CA3AF]">{viewUser.rl}{role==="maker"?` · Day ${viewUser.day}`:""}</p></div></div>
        </div>
      </div>
      {/* MAIN */}
      <div id="main-content" role="main" aria-label="Page content" className="flex-1 min-h-0 overflow-y-auto p-4 lg:p-7 bg-[#FAFAFA] relative" style={{WebkitOverflowScrolling:'touch'}} onClick={()=>{if(notifOpen){setNotifs(p=>p.map(n=>({...n,read:true})))};setNotifOpen(false);setSearchOpen(false)}}>
        <div key={scr+role} className="page-enter">
          {loading?<PageSkeleton/>:screen()}
        </div>
        {!compOpen&&<button onClick={()=>setCompOpen(true)} aria-label="Open AI Assistant Lemi" className="tour-lemi fixed bottom-4 right-4 sm:bottom-6 sm:right-6 w-12 h-12 sm:w-14 sm:h-14 rounded-full bg-gradient-to-br from-[#FF0083] to-[#e6007a] flex items-center justify-center shadow-lg hover:shadow-xl hover:scale-105 transition-all z-30 pulse-p" title="Ask Lemi">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M12 2C8 2 5 5 5 9c0 2.5 1 4 3 6l-1 5 4-2 4 2-1-5c2-2 3-3.5 3-6 0-4-3-7-5-7z" fill="white" opacity=".9"/><circle cx="10" cy="9" r="1.2" fill="#FF0083"/><circle cx="14" cy="9" r="1.2" fill="#FF0083"/><path d="M9.5 12.5c0 0 1.5 1.5 5 0" stroke="#FF0083" strokeWidth="1.2" strokeLinecap="round"/></svg>
        </button>}
      </div>
      <CompanionPanel open={compOpen} onClose={()=>setCompOpen(false)} scr={scr} setScr={setScr} role={role} emp={maker} personality={lemiPersonality}/>
    </div>
    {tourStep!==null&&(()=>{const ts=TOUR_STEPS_BY_ROLE[role]||TOUR_MAKER;return<TourOverlay step={tourStep} steps={ts} onNext={()=>{if(tourStep>=ts.length-1){setTourStep(null);setTourDone(true)}else setTourStep(tourStep+1)}} onSkip={()=>{setTourStep(null);setTourDone(true)}}/>})()}
  </div>
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
